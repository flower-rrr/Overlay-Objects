name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate project files
        run: |
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "BallOverlay"
          include ':app'
          EOF

          cat > build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.2.0' apply false
          }
          EOF

          mkdir -p app
          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.example.balloverlay'
              compileSdk 34
              defaultConfig {
                  applicationId "com.example.balloverlay"
                  minSdk 24
                  targetSdk 34
                  versionCode 5
                  versionName "5.0"
              }
              signingConfigs {
                  release {
                      storeFile file(System.getenv("HOME") + "/.android/my.keystore")
                      storePassword "mypassword123"
                      keyAlias "mykey"
                      keyPassword "mypassword123"
                  }
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      signingConfig signingConfigs.release
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
          }
          EOF

          mkdir -p app/src/main
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_SPECIAL_USE"/>
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.BallOverlay">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <activity android:name=".SummonActivity"
                      android:theme="@style/Theme.Translucent" android:exported="false"/>
                  <service android:name=".OverlayService" android:exported="false"
                      android:foregroundServiceType="specialUse"/>
              </application>
          </manifest>
          EOF

          mkdir -p app/src/main/java/com/example/balloverlay

          cat > app/src/main/java/com/example/balloverlay/Ball.java << 'JEOF'
          package com.example.balloverlay;
          import android.graphics.Color;
          import java.util.Random;
          public class Ball {
              public float x, y, vx, vy, radius;
              public int color;
              public boolean isDragging = false;
              public float dragLastX, dragLastY;
              private static final Random RND = new Random();
              private static final int[] COLORS = {
                  Color.parseColor("#F44336"), Color.parseColor("#2196F3"),
                  Color.parseColor("#4CAF50"), Color.parseColor("#FF9800"),
                  Color.parseColor("#9C27B0"), Color.parseColor("#00BCD4"),
                  Color.parseColor("#FFEB3B"), Color.parseColor("#FF4081"),
              };
              public Ball(float x, float y, float radius) {
                  this.x=x; this.y=y; this.radius=radius; this.vx=0; this.vy=0;
                  this.color=COLORS[RND.nextInt(COLORS.length)];
              }
          }
          JEOF

          cat > app/src/main/java/com/example/balloverlay/PhysicsEngine.java << 'JEOF'
          package com.example.balloverlay;
          import java.util.List;
          public class PhysicsEngine {
              private static final float GRAVITY=1200f, DAMPING=0.65f, FRICTION=0.98f, SLEEP=5f;
              private int W, H;
              public PhysicsEngine(int w, int h) { W=w; H=h; }
              public void setScreen(int w, int h) { W=w; H=h; }
              public void step(List<Ball> balls, float dt) {
                  for (Ball b : balls) {
                      if (b.isDragging) continue;
                      b.vy+=GRAVITY*dt; b.vx*=FRICTION;
                      b.x+=b.vx*dt; b.y+=b.vy*dt;
                      if (b.x-b.radius<0)  { b.x=b.radius;   b.vx= Math.abs(b.vx)*DAMPING; }
                      if (b.x+b.radius>W)  { b.x=W-b.radius; b.vx=-Math.abs(b.vx)*DAMPING; }
                      if (b.y-b.radius<0)  { b.y=b.radius;   b.vy= Math.abs(b.vy)*DAMPING; }
                      if (b.y+b.radius>H)  {
                          b.y=H-b.radius; b.vy=-Math.abs(b.vy)*DAMPING;
                          if (Math.abs(b.vy)<SLEEP) { b.vy=0; b.vx*=0.85f; }
                      }
                  }
                  for (int i=0;i<balls.size();i++) for (int j=i+1;j<balls.size();j++) {
                      Ball a=balls.get(i), b=balls.get(j);
                      float dx=b.x-a.x, dy=b.y-a.y, dist=(float)Math.sqrt(dx*dx+dy*dy), minD=a.radius+b.radius;
                      if (dist<minD&&dist>0.01f) {
                          float ov=(minD-dist)/2f, nx=dx/dist, ny=dy/dist;
                          if(!a.isDragging){a.x-=nx*ov;a.y-=ny*ov;}
                          if(!b.isDragging){b.x+=nx*ov;b.y+=ny*ov;}
                      }
                  }
              }
          }
          JEOF

          # OverlayView：只負責繪製，不處理觸控
          cat > app/src/main/java/com/example/balloverlay/OverlayView.java << 'JEOF'
          package com.example.balloverlay;
          import android.annotation.SuppressLint;
          import android.content.Context;
          import android.graphics.*;
          import android.os.Handler;
          import android.os.Looper;
          import android.view.View;
          import java.util.*;
          @SuppressLint("ViewConstructor")
          public class OverlayView extends View {
              public final List<Ball> balls = new ArrayList<>();
              private final PhysicsEngine physics;
              private final Handler handler = new Handler(Looper.getMainLooper());
              private long lastTime = System.nanoTime();
              private final Runnable loop = new Runnable() {
                  @Override public void run() {
                      long now=System.nanoTime(); float dt=Math.min((now-lastTime)/1e9f,0.05f); lastTime=now;
                      physics.step(balls,dt); invalidate(); handler.postDelayed(this,16);
                  }
              };
              public OverlayView(Context ctx, int w, int h) {
                  super(ctx); physics=new PhysicsEngine(w,h);
                  // 這個 View 完全不接受觸控，只繪製
                  setClickable(false); setFocusable(false);
                  handler.post(loop);
              }
              public void addBall(float x, float y, float r) { balls.add(new Ball(x,y,r)); }
              public void clearBalls() { balls.clear(); }
              public void destroy() { handler.removeCallbacks(loop); }
              private int lighten(int c) {
                  return Color.rgb(Math.min(255,Color.red(c)+80),Math.min(255,Color.green(c)+80),Math.min(255,Color.blue(c)+80));
              }
              @Override protected void onDraw(Canvas canvas) {
                  Paint p=new Paint(Paint.ANTI_ALIAS_FLAG);
                  for (Ball b : balls) {
                      p.setShader(new RadialGradient(b.x+b.radius*.15f,b.y+b.radius*.15f,b.radius,0x55000000,Color.TRANSPARENT,Shader.TileMode.CLAMP));
                      canvas.drawCircle(b.x+b.radius*.1f,b.y+b.radius*.1f,b.radius,p);
                      p.setShader(new RadialGradient(b.x-b.radius*.3f,b.y-b.radius*.3f,b.radius,lighten(b.color),b.color,Shader.TileMode.CLAMP));
                      canvas.drawCircle(b.x,b.y,b.radius,p);
                      p.setShader(null); p.setColor(0x55FFFFFF);
                      canvas.drawCircle(b.x-b.radius*.3f,b.y-b.radius*.3f,b.radius*.25f,p);
                  }
              }
              // 給 TouchView 用：找球
              public Ball findBall(float x, float y) {
                  for (int i=balls.size()-1;i>=0;i--) {
                      Ball b=balls.get(i); float dx=x-b.x,dy=y-b.y;
                      if (dx*dx+dy*dy<=b.radius*b.radius) return b;
                  }
                  return null;
              }
          }
          JEOF

          # TouchView：專門處理觸控，完全透明不繪製任何東西
          # 使用 FLAG_NOT_TOUCHABLE，只在命中球時動態切換成可觸碰
          cat > app/src/main/java/com/example/balloverlay/TouchView.java << 'JEOF'
          package com.example.balloverlay;
          import android.annotation.SuppressLint;
          import android.content.Context;
          import android.view.MotionEvent;
          import android.view.View;
          @SuppressLint("ViewConstructor")
          public class TouchView extends View {
              private OverlayView overlayView;
              private Ball dragging = null;
              private static final float FORCE = 40f;
              private TouchCallback callback;
              public interface TouchCallback {
                  void onHitBall();
                  void onReleaseBall();
              }
              public TouchView(Context ctx, OverlayView ov, TouchCallback cb) {
                  super(ctx);
                  this.overlayView = ov;
                  this.callback = cb;
                  setBackgroundColor(0x00000000);
              }
              @Override public boolean onTouchEvent(MotionEvent e) {
                  float x=e.getX(), y=e.getY();
                  switch(e.getAction()) {
                      case MotionEvent.ACTION_DOWN:
                          dragging = overlayView.findBall(x,y);
                          if (dragging!=null) {
                              dragging.isDragging=true;
                              dragging.dragLastX=x; dragging.dragLastY=y;
                              return true;
                          }
                          // 沒碰到球：通知釋放，讓系統切回不可觸
                          callback.onReleaseBall();
                          return false;
                      case MotionEvent.ACTION_MOVE:
                          if (dragging!=null) {
                              float ddx=x-dragging.dragLastX, ddy=y-dragging.dragLastY;
                              dragging.vx+=ddx*FORCE; dragging.vy+=ddy*FORCE;
                              dragging.x=x; dragging.y=y;
                              dragging.dragLastX=x; dragging.dragLastY=y;
                              return true;
                          }
                          return false;
                      case MotionEvent.ACTION_UP:
                      case MotionEvent.ACTION_CANCEL:
                          if (dragging!=null) {
                              dragging.isDragging=false; dragging=null;
                              callback.onReleaseBall();
                              return true;
                          }
                          return false;
                  }
                  return false;
              }
          }
          JEOF

          cat > app/src/main/java/com/example/balloverlay/OverlayService.java << 'JEOF'
          package com.example.balloverlay;
          import android.app.*;
          import android.content.Intent;
          import android.graphics.PixelFormat;
          import android.os.*;
          import android.util.DisplayMetrics;
          import android.view.WindowManager;
          import androidx.core.app.NotificationCompat;
          public class OverlayService extends Service {
              private static OverlayService instance;
              private WindowManager wm;
              private OverlayView overlayView;
              private TouchView touchView;
              private WindowManager.LayoutParams drawParams;
              private WindowManager.LayoutParams touchParams;
              private boolean drawAdded=false, touchAdded=false;
              private int screenW, screenH;
              public static OverlayService getInstance() { return instance; }

              @Override public void onCreate() {
                  super.onCreate(); instance=this;
                  wm=(WindowManager)getSystemService(WINDOW_SERVICE);
                  DisplayMetrics dm=new DisplayMetrics(); wm.getDefaultDisplay().getRealMetrics(dm);
                  screenW=dm.widthPixels; screenH=dm.heightPixels;

                  int type=Build.VERSION.SDK_INT>=Build.VERSION_CODES.O
                      ? WindowManager.LayoutParams.TYPE_APPLICATION_OVERLAY
                      : WindowManager.LayoutParams.TYPE_PHONE;

                  // 繪製層：完全不觸控（FLAG_NOT_TOUCHABLE），只顯示球
                  drawParams=new WindowManager.LayoutParams(
                      WindowManager.LayoutParams.MATCH_PARENT,
                      WindowManager.LayoutParams.MATCH_PARENT,
                      type,
                      WindowManager.LayoutParams.FLAG_NOT_FOCUSABLE
                      | WindowManager.LayoutParams.FLAG_NOT_TOUCHABLE
                      | WindowManager.LayoutParams.FLAG_NOT_TOUCH_MODAL
                      | WindowManager.LayoutParams.FLAG_LAYOUT_IN_SCREEN,
                      PixelFormat.TRANSLUCENT);

                  // 觸控層：預設也不觸控，只有需要拖曳時才開啟
                  touchParams=new WindowManager.LayoutParams(
                      WindowManager.LayoutParams.MATCH_PARENT,
                      WindowManager.LayoutParams.MATCH_PARENT,
                      type,
                      WindowManager.LayoutParams.FLAG_NOT_FOCUSABLE
                      | WindowManager.LayoutParams.FLAG_NOT_TOUCHABLE
                      | WindowManager.LayoutParams.FLAG_NOT_TOUCH_MODAL
                      | WindowManager.LayoutParams.FLAG_LAYOUT_IN_SCREEN,
                      PixelFormat.TRANSLUCENT);

                  overlayView=new OverlayView(this,screenW,screenH);
                  touchView=new TouchView(this,overlayView, new TouchView.TouchCallback(){
                      @Override public void onHitBall() { enableTouch(); }
                      @Override public void onReleaseBall() { disableTouch(); }
                  });

                  startForeground(1,buildNotification());

                  // 啟動一個 Handler 定期偵測手指是否在球上
                  // 因為 FLAG_NOT_TOUCHABLE 時收不到事件，
                  // 改用一個小的「偵測層」Window 攔截所有觸控但立即判斷
                  startHitDetection(type);
              }

              // 偵測層：接收所有觸控，判斷是否在球上，決定是否讓觸控層處理
              private WindowManager.LayoutParams detectParams;
              private android.view.View detectView;
              private void startHitDetection(int type) {
                  detectParams=new WindowManager.LayoutParams(
                      WindowManager.LayoutParams.MATCH_PARENT,
                      WindowManager.LayoutParams.MATCH_PARENT,
                      type,
                      WindowManager.LayoutParams.FLAG_NOT_FOCUSABLE
                      | WindowManager.LayoutParams.FLAG_NOT_TOUCH_MODAL
                      | WindowManager.LayoutParams.FLAG_LAYOUT_IN_SCREEN,
                      PixelFormat.TRANSLUCENT);

                  detectView=new android.view.View(this){
                      private Ball dragging=null;
                      private static final float FORCE=40f;
                      @Override public boolean onTouchEvent(android.view.MotionEvent e){
                          float x=e.getX(),y=e.getY();
                          switch(e.getAction()){
                              case android.view.MotionEvent.ACTION_DOWN:
                                  dragging=overlayView.findBall(x,y);
                                  if(dragging!=null){
                                      dragging.isDragging=true;
                                      dragging.dragLastX=x; dragging.dragLastY=y;
                                      return true;
                                  }
                                  return false; // 穿透
                              case android.view.MotionEvent.ACTION_MOVE:
                                  if(dragging!=null){
                                      float ddx=x-dragging.dragLastX,ddy=y-dragging.dragLastY;
                                      dragging.vx+=ddx*FORCE; dragging.vy+=ddy*FORCE;
                                      dragging.x=x; dragging.y=y;
                                      dragging.dragLastX=x; dragging.dragLastY=y;
                                      return true;
                                  }
                                  return false;
                              case android.view.MotionEvent.ACTION_UP:
                              case android.view.MotionEvent.ACTION_CANCEL:
                                  if(dragging!=null){dragging.isDragging=false;dragging=null;return true;}
                                  return false;
                          }
                          return false;
                      }
                  };
                  detectView.setBackgroundColor(0x00000000);
              }

              private void enableTouch() {
                  if (touchAdded) {
                      touchParams.flags &= ~WindowManager.LayoutParams.FLAG_NOT_TOUCHABLE;
                      wm.updateViewLayout(touchView, touchParams);
                  }
              }
              private void disableTouch() {
                  if (touchAdded) {
                      touchParams.flags |= WindowManager.LayoutParams.FLAG_NOT_TOUCHABLE;
                      wm.updateViewLayout(touchView, touchParams);
                  }
              }

              public void addBall(float x, float y, float r) {
                  if (overlayView==null) return;
                  if (!drawAdded) { wm.addView(overlayView,drawParams); drawAdded=true; }
                  if (!touchAdded) { wm.addView(detectView,detectParams); touchAdded=true; }
                  overlayView.addBall(x,y,r);
              }

              public void clearBalls() {
                  if (overlayView!=null) overlayView.clearBalls();
                  if (drawAdded) { wm.removeView(overlayView); drawAdded=false; }
                  if (touchAdded) { wm.removeView(detectView); touchAdded=false; }
              }

              private Notification buildNotification() {
                  String ch="ball_ch";
                  if (Build.VERSION.SDK_INT>=Build.VERSION_CODES.O)
                      ((NotificationManager)getSystemService(NOTIFICATION_SERVICE))
                          .createNotificationChannel(new NotificationChannel(ch,"球體",NotificationManager.IMPORTANCE_LOW));
                  PendingIntent pi=PendingIntent.getActivity(this,0,new Intent(this,MainActivity.class),PendingIntent.FLAG_IMMUTABLE);
                  return new NotificationCompat.Builder(this,ch)
                      .setContentTitle("球體召喚器").setContentText("點擊返回主選單")
                      .setSmallIcon(android.R.drawable.ic_dialog_info).setContentIntent(pi).build();
              }

              @Override public int onStartCommand(Intent i, int f, int s) { return START_STICKY; }
              @Override public void onDestroy() {
                  super.onDestroy();
                  if (overlayView!=null) { overlayView.destroy(); if(drawAdded) wm.removeView(overlayView); }
                  if (touchAdded) wm.removeView(detectView);
                  instance=null;
              }
              @Override public IBinder onBind(Intent i) { return null; }
          }
          JEOF

          cat > app/src/main/java/com/example/balloverlay/SummonActivity.java << 'JEOF'
          package com.example.balloverlay;
          import android.annotation.SuppressLint;
          import android.app.Activity;
          import android.graphics.*;
          import android.os.Bundle;
          import android.view.*;
          public class SummonActivity extends Activity {
              private float startX=-1,startY=-1,curX,curY;
              @Override protected void onCreate(Bundle s) {
                  super.onCreate(s);
                  requestWindowFeature(Window.FEATURE_NO_TITLE);
                  getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN,WindowManager.LayoutParams.FLAG_FULLSCREEN);
                  setContentView(new DrawView(this));
              }
              @SuppressLint("ViewConstructor")
              class DrawView extends View {
                  private final Paint bg=new Paint(),circle=new Paint(Paint.ANTI_ALIAS_FLAG),hint=new Paint(Paint.ANTI_ALIAS_FLAG),line=new Paint(Paint.ANTI_ALIAS_FLAG);
                  DrawView(SummonActivity c){
                      super(c);
                      bg.setColor(0xBB000000);
                      circle.setColor(0x884FC3F7); circle.setStyle(Paint.Style.FILL);
                      hint.setColor(Color.WHITE); hint.setTextSize(52f); hint.setTextAlign(Paint.Align.CENTER); hint.setAntiAlias(true);
                      line.setColor(Color.WHITE); line.setStrokeWidth(3f); line.setAntiAlias(true);
                  }
                  @Override protected void onDraw(Canvas c){
                      c.drawRect(0,0,getWidth(),getHeight(),bg);
                      if(startX<0){
                          c.drawText("點擊設定圓心",getWidth()/2f,getHeight()/2f-30f,hint);
                          c.drawText("拖曳決定大小",getWidth()/2f,getHeight()/2f+50f,hint);
                      } else {
                          float r=(float)Math.hypot(curX-startX,curY-startY);
                          c.drawCircle(startX,startY,Math.max(r,10f),circle);
                          c.drawLine(startX,startY,curX,curY,line);
                          hint.setTextSize(40f);
                          float ly=startY-r-24f; if(ly<60f) ly=startY+r+60f;
                          c.drawText("半徑 "+(int)r+"px",startX,ly,hint);
                          c.drawText("放開召喚",getWidth()/2f,80f,hint);
                      }
                  }
                  @Override public boolean onTouchEvent(MotionEvent e){
                      switch(e.getAction()){
                          case MotionEvent.ACTION_DOWN: startX=e.getX();startY=e.getY();curX=startX;curY=startY;invalidate();return true;
                          case MotionEvent.ACTION_MOVE: curX=e.getX();curY=e.getY();invalidate();return true;
                          case MotionEvent.ACTION_UP:
                              float r=(float)Math.hypot(curX-startX,curY-startY); r=Math.max(r,20f);
                              OverlayService svc=OverlayService.getInstance();
                              if(svc!=null) svc.addBall(startX,startY,r);
                              finish(); return true;
                      }
                      return false;
                  }
              }
          }
          JEOF

          cat > app/src/main/java/com/example/balloverlay/MainActivity.java << 'JEOF'
          package com.example.balloverlay;
          import android.content.Intent;
          import android.net.Uri;
          import android.os.Build;
          import android.os.Bundle;
          import android.provider.Settings;
          import android.widget.Toast;
          import androidx.appcompat.app.AppCompatActivity;
          public class MainActivity extends AppCompatActivity {
              private static final int REQ_PERM=1001;
              @Override protected void onCreate(Bundle s) {
                  super.onCreate(s);
                  setContentView(R.layout.activity_main);
                  findViewById(R.id.btnSummon).setOnClickListener(v->onSummon());
                  findViewById(R.id.btnClear).setOnClickListener(v->onClear());
              }
              private void onSummon(){
                  if(!hasPerm()){requestPerm();return;}
                  startService(new Intent(this,OverlayService.class));
                  startActivity(new Intent(this,SummonActivity.class));
                  moveTaskToBack(true);
              }
              private void onClear(){
                  OverlayService svc=OverlayService.getInstance();
                  if(svc!=null) svc.clearBalls();
                  Toast.makeText(this,"已刪除所有物體",Toast.LENGTH_SHORT).show();
              }
              private boolean hasPerm(){return Build.VERSION.SDK_INT<Build.VERSION_CODES.M||Settings.canDrawOverlays(this);}
              private void requestPerm(){startActivityForResult(new Intent(Settings.ACTION_MANAGE_OVERLAY_PERMISSION,Uri.parse("package:"+getPackageName())),REQ_PERM);}
              @Override protected void onActivityResult(int req,int res,Intent data){
                  super.onActivityResult(req,res,data);
                  if(req==REQ_PERM&&!hasPerm()) Toast.makeText(this,"需要「顯示在其他應用程式上方」的權限",Toast.LENGTH_LONG).show();
              }
          }
          JEOF

          mkdir -p app/src/main/res/layout
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
