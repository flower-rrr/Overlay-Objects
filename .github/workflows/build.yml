name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate project files
        run: |
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "ObjectSpawner"
          include ':app'
          EOF

          cat > build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.2.0' apply false
          }
          EOF

          mkdir -p app
          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.example.balloverlay'
              compileSdk 34
              defaultConfig {
                  applicationId "com.example.balloverlay"
                  minSdk 24
                  targetSdk 34
                  versionCode 9
                  versionName "9.0"
              }
              signingConfigs {
                  release {
                      storeFile file(System.getenv("HOME") + "/.android/my.keystore")
                      storePassword "mypassword123"
                      keyAlias "mykey"
                      keyPassword "mypassword123"
                  }
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      signingConfig signingConfigs.release
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
          }
          EOF

          mkdir -p app/src/main
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_SPECIAL_USE"/>
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.BallOverlay">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <activity android:name=".SummonActivity"
                      android:theme="@style/Theme.Translucent" android:exported="false"/>
                  <service android:name=".OverlayService" android:exported="false"
                      android:foregroundServiceType="specialUse"/>
              </application>
          </manifest>
          EOF

          mkdir -p app/src/main/java/com/example/balloverlay

          # PhysBody.java — 統一的物理物體基類
          cat > app/src/main/java/com/example/balloverlay/PhysBody.java << 'JEOF'
          package com.example.balloverlay;
          public class PhysBody {
              public static final int TYPE_BALL = 0;
              public static final int TYPE_BOX  = 1;
              public int type;
              public float x, y;       // 中心
              public float vx, vy;
              public float size;       // 球:半徑  箱:半邊長
              public boolean isDragging = false;
              public float dragLastX, dragLastY;
              public boolean dead = false; // 箱子解體用
              public PhysBody(int type, float x, float y, float size) {
                  this.type=type; this.x=x; this.y=y; this.size=size;
              }
          }
          JEOF

          # PhysicsEngine.java — 支援球和箱子，球與球彈開，箱子撞擊解體
          cat > app/src/main/java/com/example/balloverlay/PhysicsEngine.java << 'JEOF'
          package com.example.balloverlay;
          import java.util.List;
          public class PhysicsEngine {
              private static final float GRAVITY  = 1200f;
              private static final float DAMPING  = 0.60f;
              private static final float FRICTION = 0.98f;
              private static final float SLEEP    = 5f;
              // 箱子解體閾值（衝擊速度）
              private static final float BOX_BREAK_VEL = 3500f;
              private int W, H;
              public PhysicsEngine(int w, int h) { W=w; H=h; }
              public void setScreen(int w, int h) { W=w; H=h; }

              public void step(List<PhysBody> bodies, float dt) {
                  for (PhysBody b : bodies) {
                      if (b.dead || b.isDragging) continue;
                      b.vy += GRAVITY * dt;
                      b.vx *= FRICTION;
                      b.x  += b.vx * dt;
                      b.y  += b.vy * dt;
                      wallCollide(b);
                  }
                  // 物體間碰撞
                  for (int i = 0; i < bodies.size(); i++) {
                      PhysBody a = bodies.get(i);
                      if (a.dead) continue;
                      for (int j = i+1; j < bodies.size(); j++) {
                          PhysBody b = bodies.get(j);
                          if (b.dead) continue;
                          collide(a, b);
                      }
                  }
              }

              private void wallCollide(PhysBody b) {
                  float s = b.size;
                  if (b.x - s < 0)  { b.x = s;   bounce(b, true,  true);  }
                  if (b.x + s > W)  { b.x = W-s;  bounce(b, true,  false); }
                  if (b.y - s < 0)  { b.y = s;    bounce(b, false, true);  }
                  if (b.y + s > H)  {
                      float impact = Math.abs(b.vy);
                      b.y = H - s;
                      if (b.type == PhysBody.TYPE_BOX && impact > BOX_BREAK_VEL) {
                          b.dead = true; return;
                      }
                      b.vy = -impact * DAMPING;
                      if (Math.abs(b.vy) < SLEEP) { b.vy = 0; b.vx *= 0.85f; }
                  }
              }

              private void bounce(PhysBody b, boolean xAxis, boolean positive) {
                  if (xAxis) b.vx = positive ?  Math.abs(b.vx)*DAMPING : -Math.abs(b.vx)*DAMPING;
                  else       b.vy = positive ?  Math.abs(b.vy)*DAMPING : -Math.abs(b.vy)*DAMPING;
              }

              private void collide(PhysBody a, PhysBody b) {
                  float dx = b.x - a.x, dy = b.y - a.y;
                  float dist = (float) Math.sqrt(dx*dx + dy*dy);
                  float minD;
                  if (a.type==PhysBody.TYPE_BALL && b.type==PhysBody.TYPE_BALL)
                      minD = a.size + b.size;
                  else if (a.type==PhysBody.TYPE_BOX && b.type==PhysBody.TYPE_BOX)
                      minD = (a.size + b.size) * 1.0f; // AABB 近似
                  else
                      minD = a.size + b.size; // 球+箱 近似圓碰撞

                  if (dist >= minD || dist < 0.01f) return;

                  float nx = dx/dist, ny = dy/dist;
                  float overlap = minD - dist;

                  // 推開
                  if (!a.isDragging) { a.x -= nx * overlap * 0.5f; a.y -= ny * overlap * 0.5f; }
                  if (!b.isDragging) { b.x += nx * overlap * 0.5f; b.y += ny * overlap * 0.5f; }

                  // 速度交換（彈性碰撞）
                  float dvx = b.vx - a.vx, dvy = b.vy - a.vy;
                  float dot = dvx*nx + dvy*ny;
                  if (dot >= 0) return;

                  float impulse = dot * DAMPING;
                  float impactSpeed = (float)Math.sqrt(dvx*dvx+dvy*dvy);

                  if (!a.isDragging) { a.vx += impulse*nx; a.vy += impulse*ny; }
                  if (!b.isDragging) { b.vx -= impulse*nx; b.vy -= impulse*ny; }

                  // 箱子被撞擊解體
                  if (impactSpeed > BOX_BREAK_VEL) {
                      if (b.type == PhysBody.TYPE_BOX) b.dead = true;
                      if (a.type == PhysBody.TYPE_BOX) a.dead = true;
                  }
              }
          }
          JEOF

          # OverlayService.java
          cat > app/src/main/java/com/example/balloverlay/OverlayService.java << 'JEOF'
          package com.example.balloverlay;

          import android.annotation.SuppressLint;
          import android.app.*;
          import android.content.Context;
          import android.content.Intent;
          import android.graphics.*;
          import android.graphics.Color;
          import android.os.*;
          import android.util.DisplayMetrics;
          import android.view.*;
          import androidx.core.app.NotificationCompat;
          import java.util.ArrayList;
          import java.util.List;
          import java.util.Random;

          public class OverlayService extends Service implements Choreographer.FrameCallback {
              private static OverlayService instance;
              private WindowManager wm;
              private int screenW, screenH, overlayType;

              private final List<PhysBody> bodies = new ArrayList<>();
              private final PhysicsEngine physics = new PhysicsEngine(1, 1);
              private long lastTime = 0;

              private DrawView drawView;
              private boolean isDrawing = false;
              private final List<BodyTouchView> touchViews = new ArrayList<>();

              private static final int[] BALL_COLORS = {
                  Color.parseColor("#F44336"), Color.parseColor("#2196F3"),
                  Color.parseColor("#4CAF50"), Color.parseColor("#FF9800"),
                  Color.parseColor("#9C27B0"), Color.parseColor("#00BCD4"),
                  Color.parseColor("#FFEB3B"), Color.parseColor("#FF4081"),
              };
              private final Random rnd = new Random();

              public static OverlayService getInstance() { return instance; }

              @Override public void onCreate() {
                  super.onCreate(); instance = this;
                  wm = (WindowManager) getSystemService(WINDOW_SERVICE);
                  DisplayMetrics dm = new DisplayMetrics();
                  wm.getDefaultDisplay().getRealMetrics(dm);
                  screenW = dm.widthPixels; screenH = dm.heightPixels;
                  physics.setScreen(screenW, screenH);
                  overlayType = Build.VERSION.SDK_INT >= Build.VERSION_CODES.O
                      ? WindowManager.LayoutParams.TYPE_APPLICATION_OVERLAY
                      : WindowManager.LayoutParams.TYPE_PHONE;
                  drawView = new DrawView(this);
                  startForeground(1, buildNotification());
                  Choreographer.getInstance().postFrameCallback(this);
              }

              @Override public void doFrame(long frameTimeNanos) {
                  if (lastTime == 0) lastTime = frameTimeNanos;
                  float dt = Math.min((frameTimeNanos - lastTime) / 1_000_000_000f, 0.05f);
                  lastTime = frameTimeNanos;
                  physics.step(bodies, dt);
                  // 移除死亡箱子的觸控 View
                  for (int i = bodies.size()-1; i >= 0; i--) {
                      if (bodies.get(i).dead) {
                          removeBodyAt(i);
                      }
                  }
                  for (int i = 0; i < bodies.size() && i < touchViews.size(); i++)
                      touchViews.get(i).syncPosition();
                  if (isDrawing) drawView.invalidate();
                  Choreographer.getInstance().postFrameCallback(this);
              }

              private void removeBodyAt(int i) {
                  bodies.remove(i);
                  if (i < touchViews.size()) {
                      try { wm.removeView(touchViews.get(i)); } catch (Exception ignored) {}
                      touchViews.remove(i);
                  }
                  if (bodies.isEmpty() && isDrawing) { wm.removeView(drawView); isDrawing = false; }
              }

              private void ensureDrawView() {
                  if (!isDrawing) {
                      WindowManager.LayoutParams dp = new WindowManager.LayoutParams(
                          WindowManager.LayoutParams.MATCH_PARENT, WindowManager.LayoutParams.MATCH_PARENT,
                          overlayType,
                          WindowManager.LayoutParams.FLAG_NOT_FOCUSABLE
                          | WindowManager.LayoutParams.FLAG_NOT_TOUCHABLE
                          | WindowManager.LayoutParams.FLAG_LAYOUT_IN_SCREEN,
                          PixelFormat.TRANSLUCENT);
                      wm.addView(drawView, dp);
                      isDrawing = true;
                  }
              }

              public void addBall(float x, float y, float r) {
                  PhysBody b = new PhysBody(PhysBody.TYPE_BALL, x, y, r);
                  b.vx = 0; b.vy = 0;
                  // 隨機顏色存在 dead 欄位暫借用 — 改用自訂欄位
                  addBody(b, BALL_COLORS[rnd.nextInt(BALL_COLORS.length)], (int)(r*2), (int)(r*2));
              }

              public void addBox(float x, float y, float halfSize) {
                  PhysBody b = new PhysBody(PhysBody.TYPE_BOX, x, y, halfSize);
                  addBody(b, Color.parseColor("#8D6E63"), (int)(halfSize*2), (int)(halfSize*2));
              }

              private void addBody(PhysBody b, int color, int w, int h) {
                  bodies.add(b);
                  ensureDrawView();
                  BodyTouchView tv = new BodyTouchView(this, b, color);
                  touchViews.add(tv);
                  WindowManager.LayoutParams tp = new WindowManager.LayoutParams(
                      w, h, overlayType,
                      WindowManager.LayoutParams.FLAG_NOT_FOCUSABLE
                      | WindowManager.LayoutParams.FLAG_LAYOUT_NO_LIMITS,
                      PixelFormat.TRANSLUCENT);
                  tp.gravity = Gravity.TOP | Gravity.LEFT;
                  tp.x = (int)(b.x - b.size);
                  tp.y = (int)(b.y - b.size);
                  tv.layoutParams = tp;
                  wm.addView(tv, tp);
              }

              public void clearAll() {
                  bodies.clear();
                  for (BodyTouchView tv : touchViews) {
                      try { wm.removeView(tv); } catch (Exception ignored) {}
                  }
                  touchViews.clear();
                  if (isDrawing) { wm.removeView(drawView); isDrawing = false; }
              }

              // 繪製層
              @SuppressLint("ViewConstructor")
              class DrawView extends View {
                  private final Paint p = new Paint(Paint.ANTI_ALIAS_FLAG);
                  private final Paint boxPaint = new Paint(Paint.ANTI_ALIAS_FLAG);
                  private final Paint woodPaint = new Paint(Paint.ANTI_ALIAS_FLAG);
                  DrawView(Context ctx) {
                      super(ctx);
                      boxPaint.setColor(Color.parseColor("#8D6E63"));
                      woodPaint.setColor(Color.parseColor("#5D4037"));
                      woodPaint.setStyle(Paint.Style.STROKE);
                      woodPaint.setStrokeWidth(3f);
                  }
                  @Override protected void onDraw(Canvas canvas) {
                      for (int i = 0; i < bodies.size() && i < touchViews.size(); i++) {
                          PhysBody b = bodies.get(i);
                          if (b.dead) continue;
                          int col = touchViews.get(i).color;
                          if (b.type == PhysBody.TYPE_BALL) {
                              int light = Color.rgb(Math.min(255,Color.red(col)+80),Math.min(255,Color.green(col)+80),Math.min(255,Color.blue(col)+80));
                              p.setShader(new RadialGradient(b.x-b.size*.3f,b.y-b.size*.3f,b.size,light,col,Shader.TileMode.CLAMP));
                              canvas.drawCircle(b.x, b.y, b.size, p);
                              p.setShader(null); p.setColor(0x55FFFFFF);
                              canvas.drawCircle(b.x-b.size*.3f, b.y-b.size*.3f, b.size*.25f, p);
                          } else {
                              float s = b.size;
                              RectF rect = new RectF(b.x-s, b.y-s, b.x+s, b.y+s);
                              boxPaint.setColor(col);
                              canvas.drawRoundRect(rect, 8, 8, boxPaint);
                              // 木板紋路
                              canvas.drawRoundRect(rect, 8, 8, woodPaint);
                              canvas.drawLine(b.x-s+6, b.y, b.x+s-6, b.y, woodPaint);
                              canvas.drawLine(b.x, b.y-s+6, b.x, b.y+s-6, woodPaint);
                          }
                      }
                  }
              }

              // 觸控層
              @SuppressLint("ViewConstructor")
              class BodyTouchView extends View {
                  final PhysBody body;
                  WindowManager.LayoutParams layoutParams;
                  int color;
                  private int lastX = Integer.MIN_VALUE, lastY = Integer.MIN_VALUE;

                  BodyTouchView(Context ctx, PhysBody b, int color) {
                      super(ctx); this.body = b; this.color = color;
                  }

                  void syncPosition() {
                      if (layoutParams == null || body.isDragging) return;
                      int nx = (int)(body.x - body.size), ny = (int)(body.y - body.size);
                      if (nx != lastX || ny != lastY) {
                          layoutParams.x = nx; layoutParams.y = ny;
                          lastX = nx; lastY = ny;
                          try { wm.updateViewLayout(this, layoutParams); } catch(Exception ignored){}
                      }
                  }

                  @Override public boolean onTouchEvent(MotionEvent e) {
                      float rawX = e.getRawX(), rawY = e.getRawY();
                      switch(e.getAction()) {
                          case MotionEvent.ACTION_DOWN:
                              body.isDragging = true;
                              body.vx = 0; body.vy = 0;
                              body.dragLastX = rawX; body.dragLastY = rawY;
                              return true;
                          case MotionEvent.ACTION_MOVE:
                              float dx = rawX - body.dragLastX, dy = rawY - body.dragLastY;
                              body.vx += dx * 10f; body.vy += dy * 10f;
                              body.x += dx; body.y += dy;
                              body.dragLastX = rawX; body.dragLastY = rawY;
                              layoutParams.x = (int)(body.x - body.size);
                              layoutParams.y = (int)(body.y - body.size);
                              try { wm.updateViewLayout(this, layoutParams); } catch(Exception ignored){}
                              return true;
                          case MotionEvent.ACTION_UP:
                          case MotionEvent.ACTION_CANCEL:
                              body.isDragging = false;
                              return true;
                      }
                      return false;
                  }
              }

              private Notification buildNotification() {
                  String ch = "obj_ch";
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O)
                      ((NotificationManager)getSystemService(NOTIFICATION_SERVICE))
                          .createNotificationChannel(new NotificationChannel(ch,"物體產生器",NotificationManager.IMPORTANCE_LOW));
                  PendingIntent pi = PendingIntent.getActivity(this,0,new Intent(this,MainActivity.class),PendingIntent.FLAG_IMMUTABLE);
                  return new NotificationCompat.Builder(this,ch)
                      .setContentTitle("物體產生器執行中").setContentText("點擊返回主選單")
                      .setSmallIcon(android.R.drawable.ic_dialog_info).setContentIntent(pi).build();
              }

              @Override public int onStartCommand(Intent i, int f, int s) { return START_STICKY; }
              @Override public void onDestroy() {
                  super.onDestroy();
                  Choreographer.getInstance().removeFrameCallback(this);
                  clearAll(); instance = null;
              }
              @Override public IBinder onBind(Intent i) { return null; }
          }
          JEOF

          # SummonActivity.java — 加入召喚箱子選項
          cat > app/src/main/java/com/example/balloverlay/SummonActivity.java << 'JEOF'
          package com.example.balloverlay;
          import android.annotation.SuppressLint;
          import android.app.Activity;
          import android.graphics.*;
          import android.os.Bundle;
          import android.view.*;
          public class SummonActivity extends Activity {
              private float startX=-1, startY=-1, curX, curY;
              private int mode = 0; // 0=ball 1=box  (從 Intent 傳入)
              @Override protected void onCreate(Bundle s) {
                  super.onCreate(s);
                  mode = getIntent().getIntExtra("mode", 0);
                  requestWindowFeature(Window.FEATURE_NO_TITLE);
                  getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN, WindowManager.LayoutParams.FLAG_FULLSCREEN);
                  setContentView(new DrawView(this));
              }
              @SuppressLint("ViewConstructor")
              class DrawView extends View {
                  private final Paint bg=new Paint(), shape=new Paint(Paint.ANTI_ALIAS_FLAG),
                                      hint=new Paint(Paint.ANTI_ALIAS_FLAG), line=new Paint(Paint.ANTI_ALIAS_FLAG);
                  DrawView(SummonActivity c) {
                      super(c); bg.setColor(0xBB000000);
                      shape.setColor(mode==0 ? 0x884FC3F7 : 0x88A1887F);
                      shape.setStyle(Paint.Style.FILL);
                      hint.setColor(Color.WHITE); hint.setTextSize(52f); hint.setTextAlign(Paint.Align.CENTER); hint.setAntiAlias(true);
                      line.setColor(Color.WHITE); line.setStrokeWidth(3f); line.setAntiAlias(true);
                  }
                  @Override protected void onDraw(Canvas c) {
                      c.drawRect(0,0,getWidth(),getHeight(),bg);
                      String label = mode==0 ? "球" : "箱子";
                      if (startX < 0) {
                          c.drawText("點擊設定中心", getWidth()/2f, getHeight()/2f-30f, hint);
                          c.drawText("拖曳決定"+label+"大小", getWidth()/2f, getHeight()/2f+50f, hint);
                      } else {
                          float r = (float)Math.hypot(curX-startX, curY-startY);
                          if (mode == 0) {
                              c.drawCircle(startX, startY, Math.max(r,10f), shape);
                          } else {
                              c.drawRect(startX-r, startY-r, startX+r, startY+r, shape);
                          }
                          c.drawLine(startX, startY, curX, curY, line);
                          hint.setTextSize(40f);
                          float ly = startY-r-24f; if(ly<60f) ly=startY+r+60f;
                          c.drawText("大小: "+(int)r+"px", startX, ly, hint);
                          c.drawText("放開召喚", getWidth()/2f, 80f, hint);
                      }
                  }
                  @Override public boolean onTouchEvent(MotionEvent e) {
                      switch(e.getAction()) {
                          case MotionEvent.ACTION_DOWN: startX=e.getX(); startY=e.getY(); curX=startX; curY=startY; invalidate(); return true;
                          case MotionEvent.ACTION_MOVE: curX=e.getX(); curY=e.getY(); invalidate(); return true;
                          case MotionEvent.ACTION_UP:
                              float r = (float)Math.hypot(curX-startX, curY-startY); r = Math.max(r, 20f);
                              OverlayService svc = OverlayService.getInstance();
                              if (svc != null) {
                                  if (mode == 0) svc.addBall(startX, startY, r);
                                  else svc.addBox(startX, startY, r);
                              }
                              finish(); return true;
                      }
                      return false;
                  }
              }
          }
          JEOF

          # MainActivity.java
          cat > app/src/main/java/com/example/balloverlay/MainActivity.java << 'JEOF'
          package com.example.balloverlay;
          import android.content.Intent;
          import android.net.Uri;
          import android.os.Build;
          import android.os.Bundle;
          import android.provider.Settings;
          import android.widget.Toast;
          import androidx.appcompat.app.AppCompatActivity;
          public class MainActivity extends AppCompatActivity {
              private static final int REQ_PERM = 1001;
              @Override protected void onCreate(Bundle s) {
                  super.onCreate(s); setContentView(R.layout.activity_main);
                  findViewById(R.id.btnSummonBall).setOnClickListener(v -> onSummon(0));
                  findViewById(R.id.btnSummonBox).setOnClickListener(v -> onSummon(1));
                  findViewById(R.id.btnClear).setOnClickListener(v -> onClear());
              }
              private void onSummon(int mode) {
                  if (!hasPerm()) { requestPerm(); return; }
                  startService(new Intent(this, OverlayService.class));
                  Intent i = new Intent(this, SummonActivity.class);
                  i.putExtra("mode", mode);
                  startActivity(i);
                  // 不 moveTaskToBack，讓使用者停留在 MainActivity
              }
              private void onClear() {
                  OverlayService svc = OverlayService.getInstance();
                  if (svc != null) svc.clearAll();
                  Toast.makeText(this, "已刪除所有物體", Toast.LENGTH_SHORT).show();
              }
              private boolean hasPerm() { return Build.VERSION.SDK_INT < Build.VERSION_CODES.M || Settings.canDrawOverlays(this); }
              private void requestPerm() { startActivityForResult(new Intent(Settings.ACTION_MANAGE_OVERLAY_PERMISSION, Uri.parse("package:"+getPackageName())), REQ_PERM); }
              @Override protected void onActivityResult(int req, int res, Intent data) {
                  super.onActivityResult(req, res, data);
                  if (req == REQ_PERM && !hasPerm()) Toast.makeText(this, "需要「顯示在其他應用程式上方」的權限", Toast.LENGTH_LONG).show();
              }
          }
          JEOF

          mkdir -p app/src/main/res/layout
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:orientation="vertical" android:background="#1A1A2E" android:gravity="center">
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="物體產生器" android:textColor="#FFFFFF"
                  android:textSize="28sp" android:textStyle="bold" android:layout_marginBottom="8dp"/>
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="召喚的物體在手機的所有地方都生效"
                  android:textColor="#90A4AE" android:textSize="14sp" android:layout_marginBottom="40dp"/>
              <Button android:id="@+id/btnSummonBall"
                  android:layout_width="260dp" android:layout_height="60dp"
                  android:text="⚽ 召喚球" android:textSize="18sp" android:textColor="#FFFFFF"
                  android:textStyle="bold" android:backgroundTint="#1565C0" android:layout_marginBottom="16dp"/>
              <Button android:id="@+id/btnSummonBox"
                  android:layout_width="260dp" android:layout_height="60dp"
                  android:text="📦 召喚箱子" android:textSize="18sp" android:textColor="#FFFFFF"
                  android:textStyle="bold" android:backgroundTint="#5D4037" android:layout_marginBottom="16dp"/>
              <Button android:id="@+id/btnClear"
                  android:layout_width="260dp" android:layout_height="60dp"
                  android:text="🗑 刪除所有物體" android:textSize="18sp" android:textColor="#FFFFFF"
                  android:textStyle="bold" android:backgroundTint="#B71C1C"/>
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="按住物體可施力移動它" android:textColor="#546E7A"
                  android:textSize="13sp" android:layout_marginTop="32dp"/>
          </LinearLayout>
          EOF

          mkdir -p app/src/main/res/values
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources><string name="app_name">物體產生器</string></resources>
          EOF

          cat > app/src/main/res/values/themes.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.BallOverlay" parent="Theme.AppCompat.NoActionBar">
                  <item name="android:windowBackground">#1A1A2E</item>
                  <item name="android:statusBarColor">#1A1A2E</item>
              </style>
              <style name="Theme.Translucent" parent="Theme.BallOverlay">
                  <item name="android:windowIsTranslucent">true</item>
                  <item name="android:windowBackground">@android:color/transparent</item>
                  <item name="android:windowNoTitle">true</item>
                  <item name="android:windowFullscreen">true</item>
              </style>
          </resources>
          EOF

          mkdir -p app/src/main/res/drawable

          # 圖示：球的樣子
          cat > app/src/main/res/drawable/ic_launcher_foreground.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp" android:height="108dp"
              android:viewportWidth="108" android:viewportHeight="108">
              <!-- 球體 -->
              <path android:fillColor="#F44336"
                  android:pathData="M54,54 m-36,0 a36,36 0 1,0 72,0 a36,36 0 1,0 -72,0"/>
              <!-- 高光 -->
              <path android:fillColor="#FFCDD2"
                  android:pathData="M40,38 m-10,0 a10,10 0 1,0 20,0 a10,10 0 1,0 -20,0"/>
              <!-- 陰影弧線 -->
              <path android:fillColor="#00000000"
                  android:strokeColor="#C62828" android:strokeWidth="4"
                  android:pathData="M30,68 Q54,85 78,68"/>
          </vector>
          EOF

          cat > app/src/main/res/drawable/ic_launcher_background.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="#1A1A2E"/>
          </shape>
          EOF

          mkdir -p app/src/main/res/mipmap-anydpi-v26
          for name in ic_launcher ic_launcher_round; do
            cat > app/src/main/res/mipmap-anydpi-v26/$name.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@drawable/ic_launcher_background"/>
              <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          EOF
          done
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p app/src/main/res/mipmap-$density
            for name in ic_launcher ic_launcher_round; do
              echo '<?xml version="1.0" encoding="utf-8"?><bitmap xmlns:android="http://schemas.android.com/apk/res/android" android:src="@drawable/ic_launcher_background"/>' \
                > app/src/main/res/mipmap-$density/$name.xml
            done
          done

          mkdir -p gradle/wrapper
          curl -sL "https://github.com/gradle/gradle/raw/v8.2.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradlew" -o gradlew
          chmod +x gradlew
          echo "All files generated"

      - name: Restore keystore
        run: |
          mkdir -p ~/.android
          echo "${{ secrets.KEYSTORE_B64 }}" | base64 -d > ~/.android/my.keystore

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ObjectSpawner-APK
          path: app/build/outputs/apk/release/app-release.apk
