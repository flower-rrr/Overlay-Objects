name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate project files
        run: |
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "ObjectSpawner"
          include ':app'
          EOF

          cat > build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.2.0' apply false
          }
          EOF

          mkdir -p app
          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.example.balloverlay'
              compileSdk 34
              defaultConfig {
                  applicationId "com.example.balloverlay"
                  minSdk 24
                  targetSdk 34
                  versionCode 12
                  versionName "12.0"
              }
              signingConfigs {
                  release {
                      storeFile file(System.getenv("HOME") + "/.android/my.keystore")
                      storePassword "mypassword123"
                      keyAlias "mykey"
                      keyPassword "mypassword123"
                  }
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      signingConfig signingConfigs.release
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
          }
          EOF

          mkdir -p app/src/main
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_SPECIAL_USE"/>
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.BallOverlay">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <activity android:name=".SummonActivity"
                      android:theme="@style/Theme.Translucent" android:exported="false"/>
                  <service android:name=".OverlayService" android:exported="false"
                      android:foregroundServiceType="specialUse"/>
              </application>
          </manifest>
          EOF

          mkdir -p app/src/main/java/com/example/balloverlay

          cat > app/src/main/java/com/example/balloverlay/PhysBody.java << 'JEOF'
          package com.example.balloverlay;
          import java.util.ArrayList;
          import java.util.List;
          public class PhysBody {
              public static final int TYPE_BALL = 0;
              public static final int TYPE_BOX  = 1;
              public static final int TYPE_NAIL = 2;
              public int type;
              public float x, y, vx, vy, size;
              public float rot=0f, rotV=0f;
              public int color;
              public boolean isDragging=false;
              public float dragLastX, dragLastY;
              public boolean dead=false;
              public boolean nailed=false;
              public List<PhysBody> pinnedBodies=new ArrayList<>();
              public float pinOffsetX, pinOffsetY;
              public boolean destroying=false;
              public float destroyTimer=0f;
              // 靜止計數（用來做 snap）
              public int restFrames=0;
              public PhysBody(int type,float x,float y,float size,int color){
                  this.type=type;this.x=x;this.y=y;this.size=size;this.color=color;
              }
          }
          JEOF

          cat > app/src/main/java/com/example/balloverlay/Shard.java << 'JEOF'
          package com.example.balloverlay;
          public class Shard {
              public float x,y,vx,vy,w,h,rot,rotV;
              public int color;
              public boolean gone=false;
              public Shard(float x,float y,float vx,float vy,float w,float h,float rot,float rotV,int color){
                  this.x=x;this.y=y;this.vx=vx;this.vy=vy;this.w=w;this.h=h;this.rot=rot;this.rotV=rotV;this.color=color;
              }
          }
          JEOF

          cat > app/src/main/java/com/example/balloverlay/PhysicsEngine.java << 'JEOF'
          package com.example.balloverlay;
          import java.util.List;
          public class PhysicsEngine {
              private static final float GRAVITY    = 1200f;
              private static final float BALL_DAMP  = 0.60f;
              private static final float BOX_DAMP   = 0.28f;
              private static final float FRICTION   = 0.96f;
              private static final float ROT_FRIC   = 0.88f;  // 旋轉阻尼強
              private static final float SLEEP_V    = 12f;
              private static final float SLEEP_ROT  = 3f;
              private static final float SNAP_SPEED = 80f;    // 低於此速度才做角度 snap
              public  static final float BOX_BREAK  = 2500f;
              private int W, H;
              public PhysicsEngine(int w,int h){W=w;H=h;}
              public void setScreen(int w,int h){W=w;H=h;}

              public void step(List<PhysBody> bodies, float dt){
                  for(PhysBody b:bodies){
                      if(b.dead||b.destroying) continue;
                      if(b.type==PhysBody.TYPE_NAIL){
                          // 若沒釘住物體，讓釘子可以移動（但無重力）
                          if(!b.nailed&&!b.isDragging){
                              b.vx*=0.92f; b.vy*=0.92f;
                              b.x+=b.vx*dt; b.y+=b.vy*dt;
                              wallBounceNail(b);
                          }
                          // 更新被釘住的物體位置
                          for(PhysBody p:b.pinnedBodies){
                              p.x=b.x+b.pinOffsetX; p.y=b.y+b.pinOffsetY;
                              p.vx=0; p.vy=0; p.rotV=0;
                          }
                          continue;
                      }
                      if(b.isDragging) continue;
                      b.vy+=GRAVITY*dt;
                      b.vx*=FRICTION; b.rotV*=ROT_FRIC;
                      b.x+=b.vx*dt; b.y+=b.vy*dt;
                      if(b.type==PhysBody.TYPE_BOX) b.rot+=b.rotV*dt;
                      wallBounce(b);
                      // 靜止 snap：箱子速度很低時旋轉歸正
                      if(b.type==PhysBody.TYPE_BOX){
                          float spd=(float)Math.sqrt(b.vx*b.vx+b.vy*b.vy);
                          if(spd<SNAP_SPEED&&Math.abs(b.rotV)<SLEEP_ROT){
                              b.restFrames++;
                              if(b.restFrames>30){
                                  // 旋轉角度 snap 到最近的 90 度倍數
                                  float r=b.rot%360; if(r<0) r+=360;
                                  float nearest=Math.round(r/90f)*90f;
                                  b.rot+=(nearest-r)*0.08f; // 緩慢歸正
                                  b.rotV*=0.5f;
                              }
                          } else { b.restFrames=0; }
                      }
                  }
                  // 碰撞
                  for(int i=0;i<bodies.size();i++){
                      PhysBody a=bodies.get(i);
                      if(a.dead||a.destroying) continue;
                      for(int j=i+1;j<bodies.size();j++){
                          PhysBody b=bodies.get(j);
                          if(b.dead||b.destroying) continue;
                          // 釘子與其他物體的碰撞
                          if(a.type==PhysBody.TYPE_NAIL||b.type==PhysBody.TYPE_NAIL){
                              PhysBody nail=a.type==PhysBody.TYPE_NAIL?a:b;
                              PhysBody other=a.type==PhysBody.TYPE_NAIL?b:a;
                              if(nail.nailed) continue; // 已釘住就不做普通碰撞
                              collideSimple(nail,other);
                          } else {
                              collide(a,b);
                          }
                      }
                  }
              }

              private void wallBounce(PhysBody b){
                  float damp=b.type==PhysBody.TYPE_BALL?BALL_DAMP:BOX_DAMP;
                  if(b.x-b.size<0){b.x=b.size; b.vx=Math.abs(b.vx)*damp; b.rotV*=-0.3f;}
                  if(b.x+b.size>W){b.x=W-b.size; b.vx=-Math.abs(b.vx)*damp; b.rotV*=-0.3f;}
                  if(b.y-b.size<0){b.y=b.size; b.vy=Math.abs(b.vy)*damp;}
                  if(b.y+b.size>H){
                      float impact=Math.abs(b.vy);
                      b.y=H-b.size;
                      if(b.type==PhysBody.TYPE_BOX&&impact>BOX_BREAK){b.dead=true;return;}
                      b.vy=-impact*damp;
                      b.rotV*=0.3f; // 落地時大幅減少旋轉
                      if(Math.abs(b.vy)<SLEEP_V){b.vy=0;b.vx*=0.8f;b.rotV*=0.3f;}
                  }
              }

              private void wallBounceNail(PhysBody b){
                  if(b.x-b.size<0){b.x=b.size;b.vx=Math.abs(b.vx)*0.5f;}
                  if(b.x+b.size>W){b.x=W-b.size;b.vx=-Math.abs(b.vx)*0.5f;}
                  if(b.y-b.size<0){b.y=b.size;b.vy=Math.abs(b.vy)*0.5f;}
                  if(b.y+b.size>H){b.y=H-b.size;b.vy=-Math.abs(b.vy)*0.5f;}
              }

              // 一般碰撞（球/箱）
              private void collide(PhysBody a,PhysBody b){
                  float dx=b.x-a.x,dy=b.y-a.y;
                  float dist=(float)Math.sqrt(dx*dx+dy*dy);
                  float minD=a.size+b.size;
                  if(dist>=minD||dist<0.01f) return;
                  float nx=dx/dist,ny=dy/dist;
                  float overlap=minD-dist;
                  if(!a.isDragging){a.x-=nx*overlap*0.5f;a.y-=ny*overlap*0.5f;}
                  if(!b.isDragging){b.x+=nx*overlap*0.5f;b.y+=ny*overlap*0.5f;}
                  float dvx=b.vx-a.vx,dvy=b.vy-a.vy;
                  float dot=dvx*nx+dvy*ny;
                  if(dot>=0) return;
                  float speed=(float)Math.sqrt(dvx*dvx+dvy*dvy);
                  float damp=(a.type==PhysBody.TYPE_BALL&&b.type==PhysBody.TYPE_BALL)?BALL_DAMP:BOX_DAMP;
                  float imp=dot*damp;
                  if(!a.isDragging){a.vx+=imp*nx;a.vy+=imp*ny;}
                  if(!b.isDragging){b.vx-=imp*nx;b.vy-=imp*ny;}
                  // 碰撞給旋轉的衝量非常小，且有上限
                  float rotImpA=clamp(imp*ny*3f,-150f,150f);
                  float rotImpB=clamp(-imp*ny*3f,-150f,150f);
                  if(!a.isDragging&&a.type==PhysBody.TYPE_BOX) a.rotV=clamp(a.rotV+rotImpA,-400f,400f);
                  if(!b.isDragging&&b.type==PhysBody.TYPE_BOX) b.rotV=clamp(b.rotV+rotImpB,-400f,400f);
                  if(speed>BOX_BREAK){
                      if(b.type==PhysBody.TYPE_BOX) b.dead=true;
                      if(a.type==PhysBody.TYPE_BOX) a.dead=true;
                  }
              }

              // 釘子與其他物體的簡單推開（不傳速度）
              private void collideSimple(PhysBody nail,PhysBody other){
                  float dx=other.x-nail.x,dy=other.y-nail.y;
                  float dist=(float)Math.sqrt(dx*dx+dy*dy);
                  float minD=nail.size+other.size;
                  if(dist>=minD||dist<0.01f) return;
                  float nx=dx/dist,ny=dy/dist;
                  float overlap=minD-dist;
                  if(!other.isDragging){other.x+=nx*overlap;other.y+=ny*overlap;other.vx+=nx*200f;other.vy+=ny*200f;}
              }

              public void stepShards(List<Shard> shards,float dt,int sw,int sh){
                  for(Shard s:shards){
                      if(s.gone) continue;
                      s.vy+=2000f*dt;s.x+=s.vx*dt;s.y+=s.vy*dt;s.rot+=s.rotV*dt;
                      if(s.x<-400||s.x>sw+400||s.y>sh+400) s.gone=true;
                  }
              }

              private float clamp(float v,float min,float max){return Math.max(min,Math.min(max,v));}
          }
          JEOF

          cat > app/src/main/java/com/example/balloverlay/OverlayService.java << 'JEOF'
          package com.example.balloverlay;
          import android.annotation.SuppressLint;
          import android.app.*;
          import android.content.Context;
          import android.content.Intent;
          import android.graphics.*;
          import android.os.*;
          import android.util.DisplayMetrics;
          import android.view.*;
          import androidx.core.app.NotificationCompat;
          import java.util.*;

          public class OverlayService extends Service implements Choreographer.FrameCallback {
              private static OverlayService instance;
              private WindowManager wm;
              private int screenW,screenH,overlayType;
              private final List<PhysBody> bodies=new ArrayList<>();
              private final List<Shard> shards=new ArrayList<>();
              private final PhysicsEngine physics=new PhysicsEngine(1,1);
              private long lastTime=0;
              private DrawView drawView;
              private boolean isDrawing=false;
              private final List<BodyTouchView> touchViews=new ArrayList<>();
              // 模式：0=正常 1=刪除 2=放釘子
              public int interactMode=0;
              // 放釘子用的覆蓋層觸控 View
              private NailPlaceView nailPlaceView;
              private boolean nailPlaceAdded=false;

              private static final int[] BALL_COLORS={
                  Color.parseColor("#F44336"),Color.parseColor("#2196F3"),
                  Color.parseColor("#4CAF50"),Color.parseColor("#FF9800"),
                  Color.parseColor("#9C27B0"),Color.parseColor("#00BCD4"),
                  Color.parseColor("#FFEB3B"),Color.parseColor("#FF4081"),
              };
              private final Random rnd=new Random();
              public static OverlayService getInstance(){return instance;}

              @Override public void onCreate(){
                  super.onCreate();instance=this;
                  wm=(WindowManager)getSystemService(WINDOW_SERVICE);
                  DisplayMetrics dm=new DisplayMetrics();wm.getDefaultDisplay().getRealMetrics(dm);
                  screenW=dm.widthPixels;screenH=dm.heightPixels;
                  physics.setScreen(screenW,screenH);
                  overlayType=Build.VERSION.SDK_INT>=Build.VERSION_CODES.O
                      ?WindowManager.LayoutParams.TYPE_APPLICATION_OVERLAY
                      :WindowManager.LayoutParams.TYPE_PHONE;
                  drawView=new DrawView(this);
                  nailPlaceView=new NailPlaceView(this);
                  startForeground(1,buildNotification());
                  Choreographer.getInstance().postFrameCallback(this);
              }

              @Override public void doFrame(long frameTimeNanos){
                  if(lastTime==0) lastTime=frameTimeNanos;
                  float dt=Math.min((frameTimeNanos-lastTime)/1_000_000_000f,0.05f);
                  lastTime=frameTimeNanos;
                  physics.step(bodies,dt);
                  physics.stepShards(shards,dt,screenW,screenH);
                  for(int i=bodies.size()-1;i>=0;i--){
                      PhysBody b=bodies.get(i);
                      if(b.destroying){
                          b.destroyTimer+=dt*2.5f;
                          if(b.destroyTimer>=1f){removeBodyAt(i);continue;}
                      } else if(b.dead&&b.type==PhysBody.TYPE_BOX){
                          spawnShards(b);removeBodyAt(i);
                      } else if(b.dead){removeBodyAt(i);}
                  }
                  for(int i=shards.size()-1;i>=0;i--)
                      if(shards.get(i).gone) shards.remove(i);
                  for(int i=0;i<bodies.size()&&i<touchViews.size();i++)
                      touchViews.get(i).syncPosition();
                  if(isDrawing) drawView.invalidate();
                  Choreographer.getInstance().postFrameCallback(this);
              }

              // 放置釘子模式：顯示全螢幕觸控層讓使用者點選位置
              public void enterNailMode(){
                  interactMode=2;
                  ensureDrawView();
                  if(!nailPlaceAdded){
                      WindowManager.LayoutParams np=new WindowManager.LayoutParams(
                          WindowManager.LayoutParams.MATCH_PARENT,WindowManager.LayoutParams.MATCH_PARENT,
                          overlayType,
                          WindowManager.LayoutParams.FLAG_NOT_FOCUSABLE
                          |WindowManager.LayoutParams.FLAG_LAYOUT_IN_SCREEN,
                          PixelFormat.TRANSLUCENT);
                      wm.addView(nailPlaceView,np);nailPlaceAdded=true;
                  }
              }

              public void exitNailMode(){
                  interactMode=0;
                  if(nailPlaceAdded){wm.removeView(nailPlaceView);nailPlaceAdded=false;}
              }

              public void placeNailAt(float x,float y){
                  float nailR=28f;
                  PhysBody nail=new PhysBody(PhysBody.TYPE_NAIL,x,y,nailR,Color.parseColor("#9E9E9E"));
                  // 找最近的物體
                  PhysBody nearest=null; float nearDist=Float.MAX_VALUE;
                  for(PhysBody b:bodies){
                      if(b.type==PhysBody.TYPE_NAIL||b.dead||b.destroying) continue;
                      float dx=x-b.x,dy=y-b.y;
                      float dist=(float)Math.sqrt(dx*dx+dy*dy);
                      if(dist<b.size+nailR+20f&&dist<nearDist){nearDist=dist;nearest=b;}
                  }
                  if(nearest!=null){
                      nail.nailed=true;
                      nail.pinnedBodies.add(nearest);
                      nail.pinOffsetX=nearest.x-x;
                      nail.pinOffsetY=nearest.y-y;
                      nearest.vx=0;nearest.vy=0;nearest.rotV=0;
                  }
                  addBody(nail,(int)(nailR*2),(int)(nailR*2));
                  exitNailMode();
              }

              public void addBall(float x,float y,float r){
                  addBody(new PhysBody(PhysBody.TYPE_BALL,x,y,r,BALL_COLORS[rnd.nextInt(BALL_COLORS.length)]),(int)(r*2),(int)(r*2));
              }

              public void addBox(float x,float y,float half){
                  addBody(new PhysBody(PhysBody.TYPE_BOX,x,y,half,Color.parseColor("#8D6E63")),(int)(half*2),(int)(half*2));
              }

              private void addBody(PhysBody b,int w,int h){
                  bodies.add(b);ensureDrawView();
                  BodyTouchView tv=new BodyTouchView(this,b);
                  touchViews.add(tv);
                  WindowManager.LayoutParams tp=new WindowManager.LayoutParams(
                      w,h,overlayType,
                      WindowManager.LayoutParams.FLAG_NOT_FOCUSABLE
                      |WindowManager.LayoutParams.FLAG_LAYOUT_NO_LIMITS,
                      PixelFormat.TRANSLUCENT);
                  tp.gravity=Gravity.TOP|Gravity.LEFT;
                  tp.x=(int)(b.x-b.size);tp.y=(int)(b.y-b.size);
                  tv.lp=tp;wm.addView(tv,tp);
              }

              private void ensureDrawView(){
                  if(!isDrawing){
                      WindowManager.LayoutParams dp=new WindowManager.LayoutParams(
                          WindowManager.LayoutParams.MATCH_PARENT,WindowManager.LayoutParams.MATCH_PARENT,
                          overlayType,
                          WindowManager.LayoutParams.FLAG_NOT_FOCUSABLE
                          |WindowManager.LayoutParams.FLAG_NOT_TOUCHABLE
                          |WindowManager.LayoutParams.FLAG_LAYOUT_IN_SCREEN,
                          PixelFormat.TRANSLUCENT);
                      wm.addView(drawView,dp);isDrawing=true;
                  }
              }

              public void destroyBody(PhysBody b){
                  if(b.destroying||b.dead) return;
                  if(b.type==PhysBody.TYPE_NAIL){
                      for(PhysBody p:b.pinnedBodies){p.vx=(rnd.nextFloat()-0.5f)*200f;p.vy=-200f;}
                      b.pinnedBodies.clear();
                  }
                  b.destroying=true;b.destroyTimer=0f;
              }

              private void removeBodyAt(int i){
                  PhysBody removed=bodies.get(i);
                  for(PhysBody b:bodies) b.pinnedBodies.remove(removed);
                  bodies.remove(i);
                  if(i<touchViews.size()){
                      try{wm.removeView(touchViews.get(i));}catch(Exception ignored){}
                      touchViews.remove(i);
                  }
                  if(bodies.isEmpty()&&shards.isEmpty()&&isDrawing){wm.removeView(drawView);isDrawing=false;}
              }

              private void spawnShards(PhysBody box){
                  float s=box.size;
                  for(int i=0;i<6;i++){
                      float angle=(float)(rnd.nextFloat()*Math.PI*2);
                      float speed=600f+rnd.nextFloat()*1000f;
                      shards.add(new Shard(
                          box.x+(rnd.nextFloat()-0.5f)*s,box.y+(rnd.nextFloat()-0.5f)*s,
                          (float)Math.cos(angle)*speed+box.vx*0.3f,
                          (float)Math.sin(angle)*speed+box.vy*0.3f-300f,
                          s*(0.35f+rnd.nextFloat()*0.55f),s*(0.12f+rnd.nextFloat()*0.18f),
                          rnd.nextFloat()*360f,(rnd.nextFloat()-0.5f)*720f,
                          i%2==0?box.color:darken(box.color)));
                  }
              }

              int darken(int c){return Color.rgb((int)(Color.red(c)*.55f),(int)(Color.green(c)*.55f),(int)(Color.blue(c)*.55f));}

              public void clearAll(){
                  bodies.clear();shards.clear();
                  for(BodyTouchView tv:touchViews){try{wm.removeView(tv);}catch(Exception ignored){}}
                  touchViews.clear();
                  if(isDrawing){wm.removeView(drawView);isDrawing=false;}
                  exitNailMode();interactMode=0;
              }

              // 釘子放置覆蓋層：全螢幕，顯示提示，點擊後放釘子
              @SuppressLint("ViewConstructor")
              class NailPlaceView extends View {
                  private final Paint hint=new Paint(Paint.ANTI_ALIAS_FLAG);
                  private final Paint bg=new Paint();
                  NailPlaceView(Context ctx){
                      super(ctx);
                      hint.setColor(Color.WHITE);hint.setTextSize(50f);hint.setTextAlign(Paint.Align.CENTER);
                      bg.setColor(0x44000000);
                  }
                  @Override protected void onDraw(Canvas c){
                      c.drawColor(Color.TRANSPARENT,PorterDuff.Mode.CLEAR);
                      c.drawRect(0,0,getWidth(),getHeight(),bg);
                      c.drawText("點擊放置釘子",getWidth()/2f,getHeight()/2f-20f,hint);
                      hint.setTextSize(32f);hint.setColor(0xFFFFB300);
                      c.drawText("點擊其他物體上方可釘住它",getWidth()/2f,getHeight()/2f+40f,hint);
                      hint.setTextSize(50f);hint.setColor(Color.WHITE);
                  }
                  @Override public boolean onTouchEvent(MotionEvent e){
                      if(e.getAction()==MotionEvent.ACTION_UP){
                          placeNailAt(e.getX(),e.getY());
                      }
                      return true;
                  }
              }

              // DrawView
              @SuppressLint("ViewConstructor")
              class DrawView extends View {
                  private final Paint p=new Paint(Paint.ANTI_ALIAS_FLAG);
                  private final Paint sp=new Paint(Paint.ANTI_ALIAS_FLAG);
                  DrawView(Context ctx){super(ctx);}
                  @Override protected void onDraw(Canvas canvas){
                      canvas.drawColor(Color.TRANSPARENT,PorterDuff.Mode.CLEAR);
                      for(int i=0;i<bodies.size()&&i<touchViews.size();i++){
                          PhysBody b=bodies.get(i);if(b.dead) continue;
                          if(b.type==PhysBody.TYPE_BALL) drawBall(canvas,b);
                          else if(b.type==PhysBody.TYPE_BOX) drawBox(canvas,b);
                          else drawNail(canvas,b);
                      }
                      for(Shard s:shards){
                          if(s.gone) continue;
                          canvas.save();canvas.translate(s.x,s.y);canvas.rotate(s.rot);
                          sp.setColor(s.color);sp.setStyle(Paint.Style.FILL);sp.setAlpha(230);
                          canvas.drawRect(-s.w/2,-s.h/2,s.w/2,s.h/2,sp);
                          sp.setColor(darken(s.color));sp.setStyle(Paint.Style.STROKE);sp.setStrokeWidth(2f);
                          canvas.drawRect(-s.w/2,-s.h/2,s.w/2,s.h/2,sp);
                          canvas.restore();
                      }
                      if(interactMode==1){
                          Paint hp=new Paint(Paint.ANTI_ALIAS_FLAG);
                          hp.setColor(0xDDFF3333);hp.setTextSize(48f);hp.setTextAlign(Paint.Align.CENTER);
                          canvas.drawText("點選要刪除的物體",screenW/2f,130f,hp);
                      }
                  }
                  private void drawBall(Canvas c,PhysBody b){
                      float alpha=b.destroying?Math.max(0f,1f-b.destroyTimer):1f;
                      if(b.destroying){
                          float t=b.destroyTimer;
                          float r=b.size*(1f-t*0.7f);
                          p.setShader(null);p.setColor(b.color);p.setAlpha((int)(255*(1f-t)*1.4f));
                          c.drawCircle(b.x,b.y,Math.max(r,2f),p);
                          for(int k=0;k<6;k++){
                              float angle=(float)(k*Math.PI/3+t*10);
                              float px=(float)(b.x+Math.cos(angle)*b.size*t*1.6f);
                              float py=(float)(b.y+Math.sin(angle)*b.size*t*1.6f);
                              p.setAlpha((int)(200*(1f-t)));
                              c.drawCircle(px,py,b.size*.14f,p);
                          }
                          return;
                      }
                      int col=b.color;
                      int light=Color.rgb(Math.min(255,Color.red(col)+90),Math.min(255,Color.green(col)+90),Math.min(255,Color.blue(col)+90));
                      p.setShader(new RadialGradient(b.x-b.size*.3f,b.y-b.size*.3f,b.size,light,col,Shader.TileMode.CLAMP));
                      p.setAlpha(255);c.drawCircle(b.x,b.y,b.size,p);
                      p.setShader(null);p.setColor(0xCCFFFFFF);p.setAlpha(200);
                      c.drawCircle(b.x-b.size*.28f,b.y-b.size*.28f,b.size*.22f,p);
                  }
                  private void drawBox(Canvas c,PhysBody b){
                      float s=b.size;
                      c.save();c.translate(b.x,b.y);c.rotate(b.rot);
                      float alpha=b.destroying?1f-b.destroyTimer:1f;
                      if(b.destroying) c.scale(1f-b.destroyTimer*0.5f,1f-b.destroyTimer*0.5f);
                      p.setShader(null);p.setColor(b.color);p.setAlpha((int)(255*alpha));p.setStyle(Paint.Style.FILL);
                      c.drawRoundRect(new RectF(-s,-s,s,s),10,10,p);
                      p.setColor(darken(b.color));p.setStyle(Paint.Style.STROKE);p.setStrokeWidth(3f);p.setAlpha((int)(230*alpha));
                      c.drawRoundRect(new RectF(-s+4,-s+4,s-4,s-4),8,8,p);
                      c.drawLine(-s+6,0,s-6,0,p);c.drawLine(0,-s+6,0,s-6,p);
                      p.setStyle(Paint.Style.FILL);
                      c.restore();
                  }
                  private void drawNail(Canvas c,PhysBody b){
                      float r=b.size;
                      float alpha=b.destroying?1f-b.destroyTimer:1f;
                      if(b.destroying){
                          p.setColor(Color.parseColor("#9E9E9E"));p.setAlpha((int)(255*(1f-b.destroyTimer)));
                          c.drawCircle(b.x,b.y,r*(1f+b.destroyTimer),p);return;
                      }
                      p.setColor(Color.parseColor("#616161"));p.setAlpha((int)(255*alpha));p.setStyle(Paint.Style.FILL);
                      c.drawCircle(b.x,b.y,r,p);
                      p.setColor(Color.parseColor("#BDBDBD"));c.drawCircle(b.x,b.y,r*.65f,p);
                      p.setColor(Color.parseColor("#212121"));c.drawCircle(b.x,b.y,r*.2f,p);
                      if(b.nailed&&!b.pinnedBodies.isEmpty()){
                          p.setColor(Color.parseColor("#FF9800"));p.setStyle(Paint.Style.STROKE);p.setStrokeWidth(4f);
                          c.drawCircle(b.x,b.y,r+5f,p);p.setStyle(Paint.Style.FILL);
                      }
                  }
              }

              // BodyTouchView
              @SuppressLint("ViewConstructor")
              class BodyTouchView extends View {
                  final PhysBody body;
                  WindowManager.LayoutParams lp;
                  private int lastX=Integer.MIN_VALUE,lastY=Integer.MIN_VALUE;
                  BodyTouchView(Context ctx,PhysBody b){super(ctx);this.body=b;}
                  void syncPosition(){
                      if(lp==null||body.isDragging) return;
                      int nx=(int)(body.x-body.size),ny=(int)(body.y-body.size);
                      if(nx!=lastX||ny!=lastY){
                          lp.x=nx;lp.y=ny;lastX=nx;lastY=ny;
                          try{wm.updateViewLayout(this,lp);}catch(Exception ignored){}
                      }
                  }
                  @Override public boolean onTouchEvent(MotionEvent e){
                      float rawX=e.getRawX(),rawY=e.getRawY();
                      switch(e.getAction()){
                          case MotionEvent.ACTION_DOWN:
                              if(interactMode==1){destroyBody(body);interactMode=0;return true;}
                              body.isDragging=true;body.vx=0;body.vy=0;
                              if(body.type!=PhysBody.TYPE_NAIL) body.rotV=0;
                              body.dragLastX=rawX;body.dragLastY=rawY;return true;
                          case MotionEvent.ACTION_MOVE:
                              float dx=rawX-body.dragLastX,dy=rawY-body.dragLastY;
                              if(body.type==PhysBody.TYPE_NAIL){
                                  body.x+=dx;body.y+=dy;
                                  for(PhysBody p:body.pinnedBodies){
                                      p.x=body.x+body.pinOffsetX;p.y=body.y+body.pinOffsetY;
                                      p.vx=0;p.vy=0;
                                  }
                              } else {
                                  body.vx+=dx*10f;body.vy+=dy*10f;
                                  // 旋轉衝量有上限
                                  body.rotV=clamp(body.rotV+dx*1.5f,-300f,300f);
                                  body.x+=dx;body.y+=dy;
                              }
                              body.dragLastX=rawX;body.dragLastY=rawY;
                              lp.x=(int)(body.x-body.size);lp.y=(int)(body.y-body.size);
                              try{wm.updateViewLayout(this,lp);}catch(Exception ignored){}
                              return true;
                          case MotionEvent.ACTION_UP:case MotionEvent.ACTION_CANCEL:
                              body.isDragging=false;return true;
                      }
                      return false;
                  }
                  private float clamp(float v,float min,float max){return Math.max(min,Math.min(max,v));}
              }

              private Notification buildNotification(){
                  String ch="obj_ch";
                  if(Build.VERSION.SDK_INT>=Build.VERSION_CODES.O)
                      ((NotificationManager)getSystemService(NOTIFICATION_SERVICE))
                          .createNotificationChannel(new NotificationChannel(ch,"物體產生器",NotificationManager.IMPORTANCE_LOW));
                  PendingIntent pi=PendingIntent.getActivity(this,0,new Intent(this,MainActivity.class),PendingIntent.FLAG_IMMUTABLE);
                  return new NotificationCompat.Builder(this,ch)
                      .setContentTitle("物體產生器執行中").setContentText("點擊返回主選單")
                      .setSmallIcon(android.R.drawable.ic_dialog_info).setContentIntent(pi).build();
              }
              @Override public int onStartCommand(Intent i,int f,int s){return START_STICKY;}
              @Override public void onDestroy(){
                  super.onDestroy();Choreographer.getInstance().removeFrameCallback(this);clearAll();instance=null;
              }
              @Override public IBinder onBind(Intent i){return null;}
          }
          JEOF

          cat > app/src/main/java/com/example/balloverlay/SummonActivity.java << 'JEOF'
          package com.example.balloverlay;
          import android.annotation.SuppressLint;
          import android.app.Activity;
          import android.graphics.*;
          import android.os.Bundle;
          import android.view.*;
          public class SummonActivity extends Activity {
              private float startX=-1,startY=-1,curX,curY;
              private int mode=0;
              @Override protected void onCreate(Bundle s){
                  super.onCreate(s);mode=getIntent().getIntExtra("mode",0);
                  requestWindowFeature(Window.FEATURE_NO_TITLE);
                  getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN,WindowManager.LayoutParams.FLAG_FULLSCREEN);
                  setContentView(new DrawView(this));
              }
              @SuppressLint("ViewConstructor")
              class DrawView extends View {
                  private final Paint bg=new Paint(),shape=new Paint(Paint.ANTI_ALIAS_FLAG),hint=new Paint(Paint.ANTI_ALIAS_FLAG),line=new Paint(Paint.ANTI_ALIAS_FLAG);
                  DrawView(SummonActivity c){
                      super(c);bg.setColor(0xBB000000);
                      shape.setColor(mode==0?0xFF4FC3F7:0xFF8D6E63);shape.setAlpha(180);shape.setStyle(Paint.Style.FILL);
                      hint.setColor(Color.WHITE);hint.setTextSize(52f);hint.setTextAlign(Paint.Align.CENTER);hint.setAntiAlias(true);
                      line.setColor(Color.WHITE);line.setStrokeWidth(3f);line.setAntiAlias(true);
                  }
                  @Override protected void onDraw(Canvas c){
                      c.drawRect(0,0,getWidth(),getHeight(),bg);
                      String label=mode==0?"球":"箱子";
                      if(startX<0){
                          c.drawText("點擊設定中心",getWidth()/2f,getHeight()/2f-30f,hint);
                          c.drawText("拖曳決定"+label+"大小",getWidth()/2f,getHeight()/2f+50f,hint);
                      } else {
                          float r=(float)Math.hypot(curX-startX,curY-startY);
                          if(mode==0) c.drawCircle(startX,startY,Math.max(r,10f),shape);
                          else c.drawRect(startX-r,startY-r,startX+r,startY+r,shape);
                          c.drawLine(startX,startY,curX,curY,line);
                          hint.setTextSize(40f);
                          float ly=startY-r-24f;if(ly<60f) ly=startY+r+60f;
                          c.drawText("大小: "+(int)r+"px",startX,ly,hint);
                          c.drawText("放開召喚",getWidth()/2f,80f,hint);
                      }
                  }
                  @Override public boolean onTouchEvent(MotionEvent e){
                      switch(e.getAction()){
                          case MotionEvent.ACTION_DOWN:startX=e.getX();startY=e.getY();curX=startX;curY=startY;invalidate();return true;
                          case MotionEvent.ACTION_MOVE:curX=e.getX();curY=e.getY();invalidate();return true;
                          case MotionEvent.ACTION_UP:
                              float r=(float)Math.hypot(curX-startX,curY-startY);r=Math.max(r,20f);
                              OverlayService svc=OverlayService.getInstance();
                              if(svc!=null){if(mode==0)svc.addBall(startX,startY,r);else svc.addBox(startX,startY,r);}
                              finish();return true;
                      }
                      return false;
                  }
              }
          }
          JEOF

          cat > app/src/main/java/com/example/balloverlay/MainActivity.java << 'JEOF'
          package com.example.balloverlay;
          import android.content.Intent;
          import android.net.Uri;
          import android.os.Build;
          import android.os.Bundle;
          import android.provider.Settings;
          import android.widget.Toast;
          import androidx.appcompat.app.AppCompatActivity;
          public class MainActivity extends AppCompatActivity {
              private static final int REQ_PERM=1001;
              @Override protected void onCreate(Bundle s){
                  super.onCreate(s);setContentView(R.layout.activity_main);
                  findViewById(R.id.btnSummonBall).setOnClickListener(v->onSummon(0));
                  findViewById(R.id.btnSummonBox).setOnClickListener(v->onSummon(1));
                  findViewById(R.id.btnSummonNail).setOnClickListener(v->onNail());
                  findViewById(R.id.btnDelete).setOnClickListener(v->onDeleteMode());
                  findViewById(R.id.btnClear).setOnClickListener(v->onClear());
              }
              private void onSummon(int mode){
                  if(!hasPerm()){requestPerm();return;}
                  startService(new Intent(this,OverlayService.class));
                  Intent i=new Intent(this,SummonActivity.class);i.putExtra("mode",mode);
                  startActivity(i);
              }
              private void onNail(){
                  if(!hasPerm()){requestPerm();return;}
                  startService(new Intent(this,OverlayService.class));
                  OverlayService svc=OverlayService.getInstance();
                  if(svc!=null){
                      svc.enterNailMode();
                      moveTaskToBack(true); // 縮到後台讓釘子覆蓋層顯示
                  }
              }
              private void onDeleteMode(){
                  OverlayService svc=OverlayService.getInstance();
                  if(svc==null){Toast.makeText(this,"尚未召喚任何物體",Toast.LENGTH_SHORT).show();return;}
                  svc.interactMode=svc.interactMode==1?0:1;
                  Toast.makeText(this,svc.interactMode==1?"點選要刪除的物體":"已取消刪除模式",Toast.LENGTH_SHORT).show();
              }
              private void onClear(){
                  OverlayService svc=OverlayService.getInstance();
                  if(svc!=null) svc.clearAll();
                  Toast.makeText(this,"已刪除所有物體",Toast.LENGTH_SHORT).show();
              }
              private boolean hasPerm(){return Build.VERSION.SDK_INT<Build.VERSION_CODES.M||Settings.canDrawOverlays(this);}
              private void requestPerm(){startActivityForResult(new Intent(Settings.ACTION_MANAGE_OVERLAY_PERMISSION,Uri.parse("package:"+getPackageName())),REQ_PERM);}
              @Override protected void onActivityResult(int req,int res,Intent data){
                  super.onActivityResult(req,res,data);
                  if(req==REQ_PERM&&!hasPerm()) Toast.makeText(this,"需要「顯示在其他應用程式上方」的權限",Toast.LENGTH_LONG).show();
              }
          }
