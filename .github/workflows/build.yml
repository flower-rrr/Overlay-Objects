name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate project files
        run: |
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "BallOverlay"
          include ':app'
          EOF

          cat > build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.2.0' apply false
          }
          EOF

          mkdir -p app
          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.example.balloverlay'
              compileSdk 34
              defaultConfig {
                  applicationId "com.example.balloverlay"
                  minSdk 24
                  targetSdk 34
                  versionCode 2
                  versionName "2.0"
              }
              signingConfigs {
                  release {
                      storeFile file(System.getenv("HOME") + "/.android/my.keystore")
                      storePassword "mypassword123"
                      keyAlias "mykey"
                      keyPassword "mypassword123"
                  }
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      signingConfig signingConfigs.release
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
          }
          EOF

          mkdir -p app/src/main
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_SPECIAL_USE"/>
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.BallOverlay">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <activity
                      android:name=".SummonOverlayActivity"
                      android:theme="@style/Theme.BallOverlay.Transparent"
                      android:exported="false"/>
                  <service
                      android:name=".OverlayService"
                      android:exported="false"
                      android:foregroundServiceType="specialUse"/>
              </application>
          </manifest>
          EOF

          mkdir -p app/src/main/java/com/example/balloverlay

          cat > app/src/main/java/com/example/balloverlay/Ball.java << 'JEOF'
          package com.example.balloverlay;
          import android.graphics.Color;
          import java.util.Random;
          public class Ball {
              public float x, y, vx, vy, radius;
              public int color;
              public boolean isDragging = false;
              public float dragLastX, dragLastY;
              private static final Random RND = new Random();
              private static final int[] COLORS = {
                  Color.parseColor("#F44336"), Color.parseColor("#2196F3"),
                  Color.parseColor("#4CAF50"), Color.parseColor("#FF9800"),
                  Color.parseColor("#9C27B0"), Color.parseColor("#00BCD4"),
                  Color.parseColor("#FFEB3B"), Color.parseColor("#FF4081"),
              };
              public Ball(float x, float y, float radius) {
                  this.x=x; this.y=y; this.radius=radius;
                  this.vx=0; this.vy=0;
                  this.color=COLORS[RND.nextInt(COLORS.length)];
              }
          }
          JEOF

          cat > app/src/main/java/com/example/balloverlay/PhysicsEngine.java << 'JEOF'
          package com.example.balloverlay;
          import java.util.List;
          public class PhysicsEngine {
              private static final float GRAVITY  = 1200f;
              private static final float DAMPING  = 0.65f;
              private static final float FRICTION = 0.98f;
              private static final float SLEEP_VEL = 5f;
              private int screenW, screenH;
              public PhysicsEngine(int w, int h) { screenW=w; screenH=h; }
              public void setScreen(int w, int h) { screenW=w; screenH=h; }
              public void step(List<Ball> balls, float dt) {
                  for (Ball b : balls) {
                      if (b.isDragging) continue;
                      b.vy += GRAVITY * dt;
                      b.vx *= FRICTION;
                      b.x += b.vx * dt;
                      b.y += b.vy * dt;
                      if (b.x - b.radius < 0)         { b.x = b.radius;          b.vx =  Math.abs(b.vx)*DAMPING; }
                      if (b.x + b.radius > screenW)   { b.x = screenW-b.radius;  b.vx = -Math.abs(b.vx)*DAMPING; }
                      if (b.y - b.radius < 0)         { b.y = b.radius;          b.vy =  Math.abs(b.vy)*DAMPING; }
                      if (b.y + b.radius > screenH)   {
                          b.y = screenH - b.radius;
                          b.vy = -Math.abs(b.vy)*DAMPING;
                          if (Math.abs(b.vy) < SLEEP_VEL) { b.vy=0; b.vx*=0.85f; }
                      }
                  }
                  // 球與球：推開重疊但不傳遞速度
                  for (int i=0; i<balls.size(); i++) {
                      for (int j=i+1; j<balls.size(); j++) {
                          Ball a=balls.get(i), b2=balls.get(j);
                          float dx=b2.x-a.x, dy=b2.y-a.y;
                          float dist=(float)Math.sqrt(dx*dx+dy*dy);
                          float minD=a.radius+b2.radius;
                          if (dist<minD && dist>0.01f) {
                              float overlap=(minD-dist)/2f;
                              float nx=dx/dist, ny=dy/dist;
                              if (!a.isDragging)  { a.x-=nx*overlap;  a.y-=ny*overlap; }
                              if (!b2.isDragging) { b2.x+=nx*overlap; b2.y+=ny*overlap; }
                          }
                      }
                  }
              }
          }
          JEOF

          cat > app/src/main/java/com/example/balloverlay/OverlayView.java << 'JEOF'
          package com.example.balloverlay;
          import android.annotation.SuppressLint;
          import android.content.Context;
          import android.graphics.Canvas;
          import android.graphics.Color;
          import android.graphics.Paint;
          import android.graphics.RadialGradient;
          import android.graphics.Shader;
          import android.os.Handler;
          import android.os.Looper;
          import android.view.MotionEvent;
          import android.view.View;
          import java.util.ArrayList;
          import java.util.List;
          @SuppressLint("ViewConstructor")
          public class OverlayView extends View {
              private final List<Ball> balls = new ArrayList<>();
              private PhysicsEngine physics;
              private final Handler handler = new Handler(Looper.getMainLooper());
              private long lastTime = System.nanoTime();
              private static final float FORCE = 3000f;
              private Ball dragging = null;
              private final Runnable loop = new Runnable() {
                  @Override public void run() {
                      long now = System.nanoTime();
                      float dt = Math.min((now-lastTime)/1e9f, 0.05f);
                      lastTime = now;
                      if (physics != null) physics.step(balls, dt);
                      invalidate();
                      handler.postDelayed(this, 16);
                  }
              };
              public OverlayView(Context context, int screenW, int screenH) {
                  super(context);
                  physics = new PhysicsEngine(screenW, screenH);
                  handler.post(loop);
              }
              public void addBall(float x, float y, float radius) { balls.add(new Ball(x,y,radius)); }
              public void clearBalls() { balls.clear(); }
              public void updateScreen(int w, int h) { if(physics!=null) physics.setScreen(w,h); }
              private int lighten(int color) {
                  return Color.rgb(
                      Math.min(255,Color.red(color)+80),
                      Math.min(255,Color.green(color)+80),
                      Math.min(255,Color.blue(color)+80));
              }
              @Override protected void onDraw(Canvas canvas) {
                  Paint ballPaint = new Paint(Paint.ANTI_ALIAS_FLAG);
                  Paint shadow = new Paint(Paint.ANTI_ALIAS_FLAG);
                  for (Ball b : balls) {
                      shadow.setShader(new RadialGradient(
                          b.x+b.radius*0.15f, b.y+b.radius*0.15f, b.radius,
                          Color.parseColor("#55000000"), Color.TRANSPARENT, Shader.TileMode.CLAMP));
                      canvas.drawCircle(b.x+b.radius*0.1f, b.y+b.radius*0.1f, b.radius, shadow);
                      ballPaint.setShader(new RadialGradient(
                          b.x-b.radius*0.3f, b.y-b.radius*0.3f, b.radius,
                          lighten(b.color), b.color, Shader.TileMode.CLAMP));
                      canvas.drawCircle(b.x, b.y, b.radius, ballPaint);
                      Paint hl = new Paint(Paint.ANTI_ALIAS_FLAG);
                      hl.setColor(Color.parseColor("#55FFFFFF"));
                      canvas.drawCircle(b.x-b.radius*0.3f, b.y-b.radius*0.3f, b.radius*0.25f, hl);
                  }
              }
              private Ball findBall(float x, float y) {
                  for (int i=balls.size()-1; i>=0; i--) {
                      Ball b=balls.get(i);
                      float dx=x-b.x, dy=y-b.y;
                      if (dx*dx+dy*dy<=b.radius*b.radius) return b;
                  }
                  return null;
              }
              @Override public boolean onTouchEvent(MotionEvent e) {
                  float x=e.getX(), y=e.getY();
                  switch(e.getAction()) {
                      case MotionEvent.ACTION_DOWN:
                          dragging = findBall(x,y);
                          if (dragging!=null) {
                              dragging.isDragging=true;
                              dragging.dragLastX=x; dragging.dragLastY=y;
                          }
                          // 若沒碰到球，回傳 false 讓事件穿透到底下
                          return dragging != null;
                      case MotionEvent.ACTION_MOVE:
                          if (dragging!=null) {
                              float ddx=x-dragging.dragLastX, ddy=y-dragging.dragLastY;
                              dragging.vx+=ddx*FORCE*0.016f;
                              dragging.vy+=ddy*FORCE*0.016f;
                              dragging.x=x; dragging.y=y;
                              dragging.dragLastX=x; dragging.dragLastY=y;
                              return true;
                          }
                          return false;
                      case MotionEvent.ACTION_UP:
                      case MotionEvent.ACTION_CANCEL:
                          if (dragging!=null) {
                              dragging.isDragging=false; dragging=null; return true;
                          }
                          return false;
                  }
                  return false;
              }
              public void destroy() { handler.removeCallbacks(loop); }
          }
          JEOF

          cat > app/src/main/java/com/example/balloverlay/SummonOverlayActivity.java << 'JEOF'
          package com.example.balloverlay;
          import android.annotation.SuppressLint;
          import android.app.Activity;
          import android.graphics.Canvas;
          import android.graphics.Color;
          import android.graphics.Paint;
          import android.os.Bundle;
          import android.view.MotionEvent;
          import android.view.View;
          import android.view.Window;
          import android.view.WindowManager;
          public class SummonOverlayActivity extends Activity {
              private float startX=-1, startY=-1, curX, curY;
              private DrawView drawView;
              @Override protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  requestWindowFeature(Window.FEATURE_NO_TITLE);
                  getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN,
                      WindowManager.LayoutParams.FLAG_FULLSCREEN);
                  drawView = new DrawView(this);
                  setContentView(drawView);
              }
              @SuppressLint("ViewConstructor")
              class DrawView extends View {
                  private final Paint bgPaint=new Paint();
                  private final Paint circlePaint=new Paint(Paint.ANTI_ALIAS_FLAG);
                  private final Paint hintPaint=new Paint(Paint.ANTI_ALIAS_FLAG);
                  DrawView(SummonOverlayActivity ctx) {
                      super(ctx);
                      bgPaint.setColor(Color.parseColor("#AA000000"));
                      circlePaint.setColor(Color.parseColor("#884FC3F7"));
                      circlePaint.setStyle(Paint.Style.FILL);
                      hintPaint.setColor(Color.WHITE); hintPaint.setTextSize(48f);
                      hintPaint.setTextAlign(Paint.Align.CENTER); hintPaint.setAntiAlias(true);
                  }
                  @Override protected void onDraw(Canvas canvas) {
                      canvas.drawRect(0,0,getWidth(),getHeight(),bgPaint);
                      if (startX<0) {
                          canvas.drawText("點擊圓心", getWidth()/2f, getHeight()/2f-30f, hintPaint);
                          canvas.drawText("拖曳決定大小", getWidth()/2f, getHeight()/2f+40f, hintPaint);
                      } else {
                          float r=(float)Math.sqrt((curX-startX)*(curX-startX)+(curY-startY)*(curY-startY));
                          canvas.drawCircle(startX, startY, Math.max(r,10f), circlePaint);
                          Paint lp=new Paint(Paint.ANTI_ALIAS_FLAG); lp.setColor(Color.WHITE); lp.setStrokeWidth(2f);
                          canvas.drawLine(startX,startY,curX,curY,lp);
                          hintPaint.setTextSize(36f);
                          canvas.drawText("半徑: "+(int)r+" px", startX, startY-r-20f, hintPaint);
                          canvas.drawText("放開手指召喚", getWidth()/2f, 100f, hintPaint);
                      }
                  }
                  @Override public boolean onTouchEvent(MotionEvent e) {
                      switch(e.getAction()) {
                          case MotionEvent.ACTION_DOWN: startX=e.getX(); startY=e.getY(); curX=startX; curY=startY; invalidate(); return true;
                          case MotionEvent.ACTION_MOVE: curX=e.getX(); curY=e.getY(); invalidate(); return true;
                          case MotionEvent.ACTION_UP:
                              float r=(float)Math.sqrt((curX-startX)*(curX-startX)+(curY-startY)*(curY-startY));
                              r=Math.max(r,20f);
                              OverlayService svc=OverlayService.getInstance();
                              if(svc!=null) svc.addBall(startX,startY,r);
                              finish(); return true;
                      }
                      return false;
                  }
              }
          }
          JEOF

          cat > app/src/main/java/com/example/balloverlay/OverlayService.java << 'JEOF'
          package com.example.balloverlay;
          import android.app.Notification;
          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.app.PendingIntent;
          import android.app.Service;
          import android.content.Intent;
          import android.graphics.PixelFormat;
          import android.os.Build;
          import android.os.IBinder;
          import android.util.DisplayMetrics;
          import android.view.WindowManager;
          import androidx.core.app.NotificationCompat;
          public class OverlayService extends Service {
              private static OverlayService instance;
              private WindowManager wm;
              private OverlayView overlayView;
              private int screenW, screenH;
              public static OverlayService getInstance() { return instance; }
              @Override public void onCreate() {
                  super.onCreate();
                  instance = this;
                  wm = (WindowManager)getSystemService(WINDOW_SERVICE);
                  DisplayMetrics dm = new DisplayMetrics();
                  wm.getDefaultDisplay().getRealMetrics(dm);
                  screenW=dm.widthPixels; screenH=dm.heightPixels;
                  overlayView = new OverlayView(this, screenW, screenH);
                  int type = Build.VERSION.SDK_INT >= Build.VERSION_CODES.O
                      ? WindowManager.LayoutParams.TYPE_APPLICATION_OVERLAY
                      : WindowManager.LayoutParams.TYPE_PHONE;
                  WindowManager.LayoutParams params = new WindowManager.LayoutParams(
                      WindowManager.LayoutParams.MATCH_PARENT,
                      WindowManager.LayoutParams.MATCH_PARENT,
                      type,
                      // FLAG_NOT_TOUCH_MODAL 讓觸控穿透到底下的 App
                      WindowManager.LayoutParams.FLAG_NOT_FOCUSABLE |
                      WindowManager.LayoutParams.FLAG_NOT_TOUCH_MODAL |
                      WindowManager.LayoutParams.FLAG_LAYOUT_IN_SCREEN |
                      WindowManager.LayoutParams.FLAG_LAYOUT_NO_LIMITS,
                      PixelFormat.TRANSLUCENT);
                  wm.addView(overlayView, params);
                  startForeground(1, buildNotification());
              }
              private Notification buildNotification() {
                  String ch="ball_overlay";
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      NotificationChannel nc=new NotificationChannel(ch,"球體覆蓋層",NotificationManager.IMPORTANCE_LOW);
                      ((NotificationManager)getSystemService(NOTIFICATION_SERVICE)).createNotificationChannel(nc);
                  }
                  PendingIntent pi=PendingIntent.getActivity(this,0,new Intent(this,MainActivity.class),PendingIntent.FLAG_IMMUTABLE);
                  return new NotificationCompat.Builder(this,ch)
                      .setContentTitle("球體覆蓋層運行中")
                      .setContentText("點擊返回主選單")
                      .setSmallIcon(android.R.drawable.ic_dialog_info)
                      .setContentIntent(pi).build();
              }
              public void addBall(float x, float y, float radius) { if(overlayView!=null) overlayView.addBall(x,y,radius); }
              public void clearBalls() { if(overlayView!=null) overlayView.clearBalls(); }
              @Override public int onStartCommand(Intent intent, int flags, int startId) {
                  if(intent!=null&&"CLEAR".equals(intent.getAction())) clearBalls();
                  return START_STICKY;
              }
              @Override public void onDestroy() {
                  super.onDestroy();
                  if(overlayView!=null){overlayView.destroy();wm.removeView(overlayView);}
                  instance=null;
              }
              @Override public IBinder onBind(Intent i) { return null; }
          }
          JEOF

          cat > app/src/main/java/com/example/balloverlay/MainActivity.java << 'JEOF'
          package com.example.balloverlay;
          import android.content.Intent;
          import android.net.Uri;
          import android.os.Build;
          import android.os.Bundle;
          import android.provider.Settings;
          import android.widget.Button;
          import android.widget.Toast;
          import androidx.appcompat.app.AppCompatActivity;
          public class MainActivity extends AppCompatActivity {
              private static final int REQ_OVERLAY=1001;
              @Override protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  ensureServiceRunning();
                  findViewById(R.id.btnSummon).setOnClickListener(v -> {
                      if(!hasOverlayPermission()){requestOverlayPermission();return;}
                      startActivity(new Intent(this,SummonOverlayActivity.class));
                      moveTaskToBack(true);
                  });
                  findViewById(R.id.btnClear).setOnClickListener(v -> {
                      if(OverlayService.getInstance()!=null) OverlayService.getInstance().clearBalls();
                      Toast.makeText(this,"已刪除所有物體",Toast.LENGTH_SHORT).show();
                  });
              }
              @Override protected void onResume() {
                  super.onResume();
                  ensureServiceRunning();
              }
              private void ensureServiceRunning() {
                  if(!hasOverlayPermission()){requestOverlayPermission();return;}
                  if(OverlayService.getInstance()==null)
                      startService(new Intent(this,OverlayService.class));
              }
              private boolean hasOverlayPermission() {
                  return Build.VERSION.SDK_INT < Build.VERSION_CODES.M || Settings.canDrawOverlays(this);
              }
              private void requestOverlayPermission() {
                  startActivityForResult(new Intent(Settings.ACTION_MANAGE_OVERLAY_PERMISSION,
                      Uri.parse("package:"+getPackageName())), REQ_OVERLAY);
              }
              @Override protected void onActivityResult(int req, int res, Intent data) {
                  super.onActivityResult(req,res,data);
                  if(req==REQ_OVERLAY) {
                      if(hasOverlayPermission()) ensureServiceRunning();
                      else Toast.makeText(this,"需要「顯示在其他應用程式上方」的權限",Toast.LENGTH_LONG).show();
                  }
              }
          }
          JEOF

          mkdir -p app/src/main/res/layout
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:orientation="vertical" android:background="#1A1A2E" android:gravity="center">
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="球體召喚器" android:textColor="#FFFFFF"
                  android:textSize="28sp" android:textStyle="bold" android:layout_marginBottom="12dp"/>
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="召喚後球會顯示在所有應用程式上方"
                  android:textColor="#90A4AE" android:textSize="14sp" android:layout_marginBottom="48dp"/>
              <Button android:id="@+id/btnSummon"
                  android:layout_width="260dp" android:layout_height="64dp"
                  android:text="召喚球" android:textSize="18sp" android:textColor="#FFFFFF"
                  android:textStyle="bold" android:backgroundTint="#1565C0" android:layout_marginBottom="20dp"/>
              <Button android:id="@+id/btnClear"
                  android:layout_width="260dp" android:layout_height="64dp"
                  android:text="刪除所有物體" android:textSize="18sp" android:textColor="#FFFFFF"
                  android:textStyle="bold" android:backgroundTint="#B71C1C"/>
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="按住球可施力移動它" android:textColor="#546E7A"
                  android:textSize="13sp" android:layout_marginTop="32dp"/>
          </LinearLayout>
          EOF

          mkdir -p app/src/main/res/values
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources><string name="app_name">球體召喚器</string></resources>
          EOF

          cat > app/src/main/res/values/themes.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.BallOverlay" parent="Theme.AppCompat.NoActionBar">
                  <item name="android:windowBackground">#1A1A2E</item>
                  <item name="android:statusBarColor">#1A1A2E</item>
              </style>
              <style name="Theme.BallOverlay.Transparent" parent="Theme.BallOverlay">
                  <item name="android:windowIsTranslucent">true</item>
                  <item name="android:windowBackground">@android:color/transparent</item>
                  <item name="android:windowNoTitle">true</item>
              </style>
          </resources>
          EOF

          mkdir -p app/src/main/res/drawable
          cat > app/src/main/res/drawable/ic_launcher_background.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="#1565C0"/>
          </shape>
          EOF

          mkdir -p app/src/main/res/mipmap-anydpi-v26
          for name in ic_launcher ic_launcher_round; do
            cat > app/src/main/res/mipmap-anydpi-v26/$name.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@drawable/ic_launcher_background"/>
              <foreground android:drawable="@drawable/ic_launcher_background"/>
          </adaptive-icon>
          EOF
          done
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p app/src/main/res/mipmap-$density
            for name in ic_launcher ic_launcher_round; do
              echo '<?xml version="1.0" encoding="utf-8"?><bitmap xmlns:android="http://schemas.android.com/apk/res/android" android:src="@drawable/ic_launcher_background"/>' \
                > app/src/main/res/mipmap-$density/$name.xml
            done
          done

          mkdir -p gradle/wrapper
          curl -sL "https://github.com/gradle/gradle/raw/v8.2.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradlew" -o gradlew
          chmod +x gradlew
          echo "All files generated"

      - name: Restore keystore
        run: |
          mkdir -p ~/.android
          echo "${{ secrets.KEYSTORE_B64 }}" | base64 -d > ~/.android/my.keystore

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BallOverlay-APK
          path: app/build/outputs/apk/release/app-release.apk
