name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate project files
        run: |
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "BallOverlay"
          include ':app'
          EOF

          cat > build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.2.0' apply false
          }
          EOF

          mkdir -p app
          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.example.balloverlay'
              compileSdk 34
              defaultConfig {
                  applicationId "com.example.balloverlay"
                  minSdk 24
                  targetSdk 34
                  versionCode 8
                  versionName "8.0"
              }
              signingConfigs {
                  release {
                      storeFile file(System.getenv("HOME") + "/.android/my.keystore")
                      storePassword "mypassword123"
                      keyAlias "mykey"
                      keyPassword "mypassword123"
                  }
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      signingConfig signingConfigs.release
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
          }
          EOF

          mkdir -p app/src/main
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_SPECIAL_USE"/>
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.BallOverlay">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <activity android:name=".SummonActivity"
                      android:theme="@style/Theme.Translucent" android:exported="false"/>
                  <service android:name=".OverlayService" android:exported="false"
                      android:foregroundServiceType="specialUse"/>
              </application>
          </manifest>
          EOF

          mkdir -p app/src/main/java/com/example/balloverlay

          # Ball.java
          cat > app/src/main/java/com/example/balloverlay/Ball.java << 'JEOF'
          package com.example.balloverlay;
          import android.graphics.Color;
          import java.util.Random;
          public class Ball {
              public float x, y, vx, vy, radius;
              public int color;
              public boolean isDragging = false;
              public float dragLastX, dragLastY;
              private static final Random RND = new Random();
              private static final int[] COLORS = {
                  Color.parseColor("#F44336"), Color.parseColor("#2196F3"),
                  Color.parseColor("#4CAF50"), Color.parseColor("#FF9800"),
                  Color.parseColor("#9C27B0"), Color.parseColor("#00BCD4"),
                  Color.parseColor("#FFEB3B"), Color.parseColor("#FF4081"),
              };
              public Ball(float x, float y, float radius) {
                  this.x=x; this.y=y; this.radius=radius; this.vx=0; this.vy=0;
                  this.color=COLORS[RND.nextInt(COLORS.length)];
              }
          }
          JEOF

          # PhysicsEngine.java
          cat > app/src/main/java/com/example/balloverlay/PhysicsEngine.java << 'JEOF'
          package com.example.balloverlay;
          import java.util.List;
          public class PhysicsEngine {
              private static final float GRAVITY=1200f, DAMPING=0.65f, FRICTION=0.98f, SLEEP=5f;
              private int W, H;
              public PhysicsEngine(int w, int h) { W=w; H=h; }
              public void setScreen(int w, int h) { W=w; H=h; }
              public void step(List<Ball> balls, float dt) {
                  for (Ball b : balls) {
                      if (b.isDragging) continue;
                      b.vy+=GRAVITY*dt; b.vx*=FRICTION;
                      b.x+=b.vx*dt; b.y+=b.vy*dt;
                      if (b.x-b.radius<0)  { b.x=b.radius;   b.vx= Math.abs(b.vx)*DAMPING; }
                      if (b.x+b.radius>W)  { b.x=W-b.radius; b.vx=-Math.abs(b.vx)*DAMPING; }
                      if (b.y-b.radius<0)  { b.y=b.radius;   b.vy= Math.abs(b.vy)*DAMPING; }
                      if (b.y+b.radius>H)  {
                          b.y=H-b.radius; b.vy=-Math.abs(b.vy)*DAMPING;
                          if (Math.abs(b.vy)<SLEEP) { b.vy=0; b.vx*=0.85f; }
                      }
                  }
                  for (int i=0;i<balls.size();i++) for (int j=i+1;j<balls.size();j++) {
                      Ball a=balls.get(i), b=balls.get(j);
                      float dx=b.x-a.x, dy=b.y-a.y, dist=(float)Math.sqrt(dx*dx+dy*dy), minD=a.radius+b.radius;
                      if (dist<minD&&dist>0.01f) {
                          float ov=(minD-dist)/2f, nx=dx/dist, ny=dy/dist;
                          if(!a.isDragging){a.x-=nx*ov;a.y-=ny*ov;}
                          if(!b.isDragging){b.x+=nx*ov;b.y+=ny*ov;}
                      }
                  }
              }
          }
          JEOF

          # OverlayService.java
          # 架構：
          # 1. 一個全螢幕 FLAG_NOT_TOUCHABLE 的繪製層 (DrawView)
          # 2. 每個球各有一個小型 Window，大小 = 球直徑，位置跟著球移動
          #    這些小 Window 可觸控，且因為只覆蓋球的範圍，球外完全穿透
          cat > app/src/main/java/com/example/balloverlay/OverlayService.java << 'JEOF'
          package com.example.balloverlay;
          import android.annotation.SuppressLint;
          import android.app.*;
          import android.content.Context;
          import android.content.Intent;
          import android.graphics.*;
          import android.os.*;
          import android.util.DisplayMetrics;
          import android.view.*;
          import android.view.WindowManager;
          import androidx.core.app.NotificationCompat;
          import java.util.*;

          public class OverlayService extends Service {
              private static OverlayService instance;
              private WindowManager wm;
              private int screenW, screenH;
              private int overlayType;

              // 物理
              private final List<Ball> balls = new ArrayList<>();
              private final PhysicsEngine physics = new PhysicsEngine(1, 1);
              private final Handler mainHandler = new Handler(Looper.getMainLooper());
              private long lastTime = System.nanoTime();

              // 繪製層（全螢幕，FLAG_NOT_TOUCHABLE）
              private DrawView drawView;
              private boolean drawAdded = false;

              // 每個球的觸控 Window
              private final List<BallTouchView> touchViews = new ArrayList<>();

              public static OverlayService getInstance() { return instance; }

              @Override public void onCreate() {
                  super.onCreate(); instance=this;
                  wm=(WindowManager)getSystemService(WINDOW_SERVICE);
                  DisplayMetrics dm=new DisplayMetrics(); wm.getDefaultDisplay().getRealMetrics(dm);
                  screenW=dm.widthPixels; screenH=dm.heightPixels;
                  physics.setScreen(screenW, screenH);
                  overlayType = Build.VERSION.SDK_INT >= Build.VERSION_CODES.O
                      ? WindowManager.LayoutParams.TYPE_APPLICATION_OVERLAY
                      : WindowManager.LayoutParams.TYPE_PHONE;
                  drawView = new DrawView(this);
                  startForeground(1, buildNotification());
                  startLoop();
              }

              private void startLoop() {
                  mainHandler.post(new Runnable() {
                      @Override public void run() {
                          long now = System.nanoTime();
                          float dt = Math.min((now - lastTime) / 1e9f, 0.05f);
                          lastTime = now;
                          physics.step(balls, dt);
                          // 更新每個球的觸控 Window 位置
                          for (int i = 0; i < balls.size() && i < touchViews.size(); i++) {
                              touchViews.get(i).updatePosition(balls.get(i));
                          }
                          if (drawAdded) drawView.invalidate();
                          mainHandler.postDelayed(this, 16);
                      }
                  });
              }

              public void addBall(float x, float y, float r) {
                  Ball b = new Ball(x, y, r);
                  balls.add(b);
                  // 加繪製層（第一個球時）
                  if (!drawAdded) {
                      WindowManager.LayoutParams dp = new WindowManager.LayoutParams(
                          WindowManager.LayoutParams.MATCH_PARENT,
                          WindowManager.LayoutParams.MATCH_PARENT,
                          overlayType,
                          WindowManager.LayoutParams.FLAG_NOT_FOCUSABLE
                          | WindowManager.LayoutParams.FLAG_NOT_TOUCHABLE
                          | WindowManager.LayoutParams.FLAG_NOT_TOUCH_MODAL
                          | WindowManager.LayoutParams.FLAG_LAYOUT_IN_SCREEN,
                          PixelFormat.TRANSLUCENT);
                      wm.addView(drawView, dp);
                      drawAdded = true;
                  }
                  // 為這顆球加觸控 Window
                  BallTouchView tv = new BallTouchView(this, b);
                  touchViews.add(tv);
                  int size = (int)(r * 2) + 4;
                  WindowManager.LayoutParams tp = new WindowManager.LayoutParams(
                      size, size, overlayType,
                      WindowManager.LayoutParams.FLAG_NOT_FOCUSABLE
                      | WindowManager.LayoutParams.FLAG_NOT_TOUCH_MODAL
                      | WindowManager.LayoutParams.FLAG_LAYOUT_IN_SCREEN
                      | WindowManager.LayoutParams.FLAG_LAYOUT_NO_LIMITS,
                      PixelFormat.TRANSLUCENT);
                  tp.gravity = Gravity.TOP | Gravity.LEFT;
                  tp.x = (int)(b.x - r) - 2;
                  tp.y = (int)(b.y - r) - 2;
                  tv.setParams(tp);
                  wm.addView(tv, tp);
              }

              public void clearBalls() {
                  balls.clear();
                  for (BallTouchView tv : touchViews) {
                      try { wm.removeView(tv); } catch (Exception ignored) {}
                  }
                  touchViews.clear();
                  if (drawAdded) { wm.removeView(drawView); drawAdded=false; }
              }

              // 繪製層：只畫球，不接受觸控
              @SuppressLint("ViewConstructor")
              class DrawView extends View {
                  DrawView(Context ctx) { super(ctx); }
                  @Override protected void onDraw(Canvas canvas) {
                      Paint p = new Paint(Paint.ANTI_ALIAS_FLAG);
                      for (Ball b : balls) {
                          int light = Color.rgb(Math.min(255,Color.red(b.color)+80),Math.min(255,Color.green(b.color)+80),Math.min(255,Color.blue(b.color)+80));
                          p.setShader(new RadialGradient(b.x+b.radius*.15f,b.y+b.radius*.15f,b.radius,0x55000000,Color.TRANSPARENT,Shader.TileMode.CLAMP));
                          canvas.drawCircle(b.x+b.radius*.1f,b.y+b.radius*.1f,b.radius,p);
                          p.setShader(new RadialGradient(b.x-b.radius*.3f,b.y-b.radius*.3f,b.radius,light,b.color,Shader.TileMode.CLAMP));
                          canvas.drawCircle(b.x,b.y,b.radius,p);
                          p.setShader(null); p.setColor(0x55FFFFFF);
                          canvas.drawCircle(b.x-b.radius*.3f,b.y-b.radius*.3f,b.radius*.25f,p);
                      }
                  }
              }

              // 每個球的觸控 View：大小 = 球直徑，透明，只處理拖曳
              @SuppressLint("ViewConstructor")
              class BallTouchView extends View {
                  private Ball ball;
                  private WindowManager.LayoutParams params;
                  private static final float FORCE = 40f;
                  BallTouchView(Context ctx, Ball b) {
                      super(ctx); this.ball=b;
                      setBackgroundColor(Color.TRANSPARENT);
                  }
                  void setParams(WindowManager.LayoutParams p) { this.params=p; }
                  void updatePosition(Ball b) {
                      if (params==null || b.isDragging) return;
                      int size=(int)(b.radius*2)+4;
                      params.width=size; params.height=size;
                      params.x=(int)(b.x-b.radius)-2;
                      params.y=(int)(b.y-b.radius)-2;
                      try { wm.updateViewLayout(this, params); } catch(Exception ignored){}
                  }
                  @Override public boolean onTouchEvent(MotionEvent e) {
                      // 座標是相對於這個小 View 的，需轉成螢幕座標
                      float sx = params.x + e.getX();
                      float sy = params.y + e.getY();
                      switch(e.getAction()) {
                          case MotionEvent.ACTION_DOWN:
                              ball.isDragging=true;
                              ball.dragLastX=sx; ball.dragLastY=sy;
                              return true;
                          case MotionEvent.ACTION_MOVE:
                              float ddx=sx-ball.dragLastX, ddy=sy-ball.dragLastY;
                              ball.vx+=ddx*FORCE; ball.vy+=ddy*FORCE;
                              ball.x=sx; ball.y=sy;
                              ball.dragLastX=sx; ball.dragLastY=sy;
                              // 拖曳時直接移動 Window
                              params.x=(int)(sx-ball.radius)-2;
                              params.y=(int)(sy-ball.radius)-2;
                              try { wm.updateViewLayout(this, params); } catch(Exception ignored){}
                              return true;
                          case MotionEvent.ACTION_UP:
                          case MotionEvent.ACTION_CANCEL:
                              ball.isDragging=false;
                              return true;
                      }
                      return false;
                  }
              }

              private Notification buildNotification() {
                  String ch="ball_ch";
                  if (Build.VERSION.SDK_INT>=Build.VERSION_CODES.O)
                      ((NotificationManager)getSystemService(NOTIFICATION_SERVICE))
                          .createNotificationChannel(new NotificationChannel(ch,"球體",NotificationManager.IMPORTANCE_LOW));
                  PendingIntent pi=PendingIntent.getActivity(this,0,new Intent(this,MainActivity.class),PendingIntent.FLAG_IMMUTABLE);
                  return new NotificationCompat.Builder(this,ch)
                      .setContentTitle("球體召喚器").setContentText("點擊返回主選單")
                      .setSmallIcon(android.R.drawable.ic_dialog_info).setContentIntent(pi).build();
              }
              @Override public int onStartCommand(Intent i, int f, int s) { return START_STICKY; }
              @Override public void onDestroy() {
                  super.onDestroy(); clearBalls(); instance=null;
              }
              @Override public IBinder onBind(Intent i) { return null; }
          }
          JEOF

          cat > app/src/main/java/com/example/balloverlay/SummonActivity.java << 'JEOF'
          package com.example.balloverlay;
          import android.annotation.SuppressLint;
          import android.app.Activity;
          import android.graphics.*;
          import android.os.Bundle;
          import android.view.*;
          public class SummonActivity extends Activity {
              private float startX=-1,startY=-1,curX,curY;
              @Override protected void onCreate(Bundle s) {
                  super.onCreate(s);
                  requestWindowFeature(Window.FEATURE_NO_TITLE);
                  getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN,WindowManager.LayoutParams.FLAG_FULLSCREEN);
                  setContentView(new DrawView(this));
              }
              @SuppressLint("ViewConstructor")
              class DrawView extends View {
                  private final Paint bg=new Paint(),circle=new Paint(Paint.ANTI_ALIAS_FLAG),hint=new Paint(Paint.ANTI_ALIAS_FLAG),line=new Paint(Paint.ANTI_ALIAS_FLAG);
                  DrawView(SummonActivity c){
                      super(c); bg.setColor(0xBB000000);
                      circle.setColor(0x884FC3F7); circle.setStyle(Paint.Style.FILL);
                      hint.setColor(Color.WHITE); hint.setTextSize(52f); hint.setTextAlign(Paint.Align.CENTER); hint.setAntiAlias(true);
                      line.setColor(Color.WHITE); line.setStrokeWidth(3f); line.setAntiAlias(true);
                  }
                  @Override protected void onDraw(Canvas c){
                      c.drawRect(0,0,getWidth(),getHeight(),bg);
                      if(startX<0){
                          c.drawText("點擊設定圓心",getWidth()/2f,getHeight()/2f-30f,hint);
                          c.drawText("拖曳決定大小",getWidth()/2f,getHeight()/2f+50f,hint);
                      } else {
                          float r=(float)Math.hypot(curX-startX,curY-startY);
                          c.drawCircle(startX,startY,Math.max(r,10f),circle);
                          c.drawLine(startX,startY,curX,curY,line);
                          hint.setTextSize(40f);
                          float ly=startY-r-24f; if(ly<60f) ly=startY+r+60f;
                          c.drawText("半徑 "+(int)r+"px",startX,ly,hint);
                          c.drawText("放開召喚",getWidth()/2f,80f,hint);
                      }
                  }
                  @Override public boolean onTouchEvent(MotionEvent e){
                      switch(e.getAction()){
                          case MotionEvent.ACTION_DOWN: startX=e.getX();startY=e.getY();curX=startX;curY=startY;invalidate();return true;
                          case MotionEvent.ACTION_MOVE: curX=e.getX();curY=e.getY();invalidate();return true;
                          case MotionEvent.ACTION_UP:
                              float r=(float)Math.hypot(curX-startX,curY-startY); r=Math.max(r,20f);
                              OverlayService svc=OverlayService.getInstance();
                              if(svc!=null) svc.addBall(startX,startY,r);
                              finish(); return true;
                      }
                      return false;
                  }
              }
          }
          JEOF

          cat > app/src/main/java/com/example/balloverlay/MainActivity.java << 'JEOF'
          package com.example.balloverlay;
          import android.content.Intent;
          import android.net.Uri;
          import android.os.Build;
          import android.os.Bundle;
          import android.provider.Settings;
          import android.widget.Toast;
          import androidx.appcompat.app.AppCompatActivity;
          public class MainActivity extends AppCompatActivity {
              private static final int REQ_PERM=1001;
              @Override protected void onCreate(Bundle s) {
                  super.onCreate(s); setContentView(R.layout.activity_main);
                  findViewById(R.id.btnSummon).setOnClickListener(v->onSummon());
                  findViewById(R.id.btnClear).setOnClickListener(v->onClear());
              }
              private void onSummon(){
                  if(!hasPerm()){requestPerm();return;}
                  startService(new Intent(this,OverlayService.class));
                  startActivity(new Intent(this,SummonActivity.class));
                  moveTaskToBack(true);
              }
              private void onClear(){
                  OverlayService svc=OverlayService.getInstance();
                  if(svc!=null) svc.clearBalls();
                  Toast.makeText(this,"已刪除所有物體",Toast.LENGTH_SHORT).show();
              }
              private boolean hasPerm(){return Build.VERSION.SDK_INT<Build.VERSION_CODES.M||Settings.canDrawOverlays(this);}
              private void requestPerm(){startActivityForResult(new Intent(Settings.ACTION_MANAGE_OVERLAY_PERMISSION,Uri.parse("package:"+getPackageName())),REQ_PERM);}
              @Override protected void onActivityResult(int req,int res,Intent data){
                  super.onActivityResult(req,res,data);
                  if(req==REQ_PERM&&!hasPerm()) Toast.makeText(this,"需要「顯示在其他應用程式上方」的權限",Toast.LENGTH_LONG).show();
              }
          }
          JEOF

          mkdir -p app/src/main/res/layout
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:orientation="vertical" android:background="#1A1A2E" android:gravity="center">
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="球體召喚器" android:textColor="#FFFFFF"
                  android:textSize="28sp" android:textStyle="bold" android:layout_marginBottom="12dp"/>
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="球會顯示在所有應用程式上方" android:textColor="#90A4AE"
                  android:textSize="14sp" android:layout_marginBottom="48dp"/>
              <Button android:id="@+id/btnSummon"
                  android:layout_width="260dp" android:layout_height="64dp"
                  android:text="召喚球" android:textSize="18sp" android:textColor="#FFFFFF"
                  android:textStyle="bold" android:backgroundTint="#1565C0" android:layout_marginBottom="20dp"/>
              <Button android:id="@+id/btnClear"
                  android:layout_width="260dp" android:layout_height="64dp"
                  android:text="刪除所有物體" android:textSize="18sp" android:textColor="#FFFFFF"
                  android:textStyle="bold" android:backgroundTint="#B71C1C"/>
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="按住球可施力移動它" android:textColor="#546E7A"
                  android:textSize="13sp" android:layout_marginTop="32dp"/>
          </LinearLayout>
          EOF

          mkdir -p app/src/main/res/values
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources><string name="app_name">球體召喚器</string></resources>
          EOF

          cat > app/src/main/res/values/themes.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.BallOverlay" parent="Theme.AppCompat.NoActionBar">
                  <item name="android:windowBackground">#1A1A2E</item>
                  <item name="android:statusBarColor">#1A1A2E</item>
              </style>
              <style name="Theme.Translucent" parent="Theme.BallOverlay">
                  <item name="android:windowIsTranslucent">true</item>
                  <item name="android:windowBackground">@android:color/transparent</item>
                  <item name="android:windowNoTitle">true</item>
                  <item name="android:windowFullscreen">true</item>
              </style>
          </resources>
          EOF

          mkdir -p app/src/main/res/drawable
          cat > app/src/main/res/drawable/ic_launcher_background.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="#1565C0"/>
          </shape>
          EOF

          mkdir -p app/src/main/res/mipmap-anydpi-v26
          for name in ic_launcher ic_launcher_round; do
            cat > app/src/main/res/mipmap-anydpi-v26/$name.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@drawable/ic_launcher_background"/>
              <foreground android:drawable="@drawable/ic_launcher_background"/>
          </adaptive-icon>
          EOF
          done
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p app/src/main/res/mipmap-$density
            for name in ic_launcher ic_launcher_round; do
              echo '<?xml version="1.0" encoding="utf-8"?><bitmap xmlns:android="http://schemas.android.com/apk/res/android" android:src="@drawable/ic_launcher_background"/>' \
                > app/src/main/res/mipmap-$density/$name.xml
            done
          done

          mkdir -p gradle/wrapper
          curl -sL "https://github.com/gradle/gradle/raw/v8.2.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradlew" -o gradlew
          chmod +x gradlew
          echo "All files generated"

      - name: Restore keystore
        run: |
          mkdir -p ~/.android
          echo "${{ secrets.KEYSTORE_B64 }}" | base64 -d > ~/.android/my.keystore

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BallOverlay-APK
          path: app/build/outputs/apk/release/app-release.apk
